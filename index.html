<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AMI — Asistente Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

<style>
/* ═══════════════════════════════════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════════════════════════════════════ */
:root {
  --t:           #00CCA3;
  --t-bright:    #00FFE0;
  --t-dim:       rgba(0, 204, 163, 0.12);
  --t-glow:      rgba(0, 204, 163, 0.45);
  --t-glow2:     rgba(0, 255, 224, 0.20);
  --bg:          #030A09;
  --bg2:         #04110E;
  --panel-bg:    rgba(3, 14, 11, 0.88);
  --panel-border:rgba(0, 204, 163, 0.28);
  --text:        #B8EDE4;
  --text-dim:    rgba(184, 237, 228, 0.55);
  --text-bright: #E0FFF9;
  --danger:      #FF4455;
  --warn:        #FFCC00;
  --font-hud:    'Orbitron', monospace;
  --font-body:   'Rajdhani', sans-serif;
  --font-mono:   'JetBrains Mono', monospace;
  --panel-r:     8px;
  --scan-speed:  8s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ═══════════════════════════════════════════════════════════════════════
   CANVAS & BACKGROUND
══════════════════════════════════════════════════════════════════════════ */
#three-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
}
#bg-noise {
  position: fixed; inset: 0; z-index: 1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px;
  opacity: 0.6;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════════════════
   SCANLINES OVERLAY
══════════════════════════════════════════════════════════════════════════ */
#scanlines {
  position: fixed; inset: 0; z-index: 2;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 204, 163, 0.025) 2px,
    rgba(0, 204, 163, 0.025) 4px
  );
  pointer-events: none;
  animation: scanMove var(--scan-speed) linear infinite;
}
@keyframes scanMove {
  0%   { background-position: 0 0; }
  100% { background-position: 0 256px; }
}

/* Moving scan line */
#scan-beam {
  position: fixed; left: 0; right: 0; z-index: 3;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--t-glow), var(--t-bright), var(--t-glow), transparent);
  opacity: 0;
  pointer-events: none;
  animation: beamSweep 12s ease-in-out infinite;
}
@keyframes beamSweep {
  0%   { top: -2px; opacity: 0; }
  5%   { opacity: 0.6; }
  90%  { opacity: 0.3; }
  95%  { top: 100vh; opacity: 0; }
  100% { top: 100vh; opacity: 0; }
}

/* ═══════════════════════════════════════════════════════════════════════
   HUD CORNERS
══════════════════════════════════════════════════════════════════════════ */
.hud-corner {
  position: fixed; z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.7;
  pointer-events: none;
}
#hud-tl { top: 16px; left: 16px; }
#hud-tr { top: 16px; right: 16px; text-align: right; }
#hud-bl { bottom: 16px; left: 16px; }
#hud-br { bottom: 16px; right: 16px; text-align: right; }

.hud-val { color: var(--t); }
.hud-label { color: var(--text-dim); }

/* Corner bracket decorations */
.hud-corner::before, .hud-corner::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: var(--t);
  border-style: solid;
  opacity: 0.5;
}
#hud-tl::before { top: -4px; left: -4px; border-width: 1px 0 0 1px; }
#hud-tr::before { top: -4px; right: -4px; border-width: 1px 1px 0 0; }
#hud-bl::before { bottom: -4px; left: -4px; border-width: 0 0 1px 1px; }
#hud-br::before { bottom: -4px; right: -4px; border-width: 0 1px 1px 0; }

/* ═══════════════════════════════════════════════════════════════════════
   CORE — ORB & VOICE VISUALIZER
══════════════════════════════════════════════════════════════════════════ */
#core {
  position: fixed;
  bottom: 40px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px;
}

#orb-container {
  position: relative;
  width: 80px; height: 80px;
  cursor: pointer;
}
#orb-canvas {
  width: 80px; height: 80px;
  border-radius: 50%;
}
#orb-ring {
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid var(--panel-border);
  animation: orbRingPulse 3s ease-in-out infinite;
}
#orb-ring2 {
  position: absolute; inset: -12px;
  border-radius: 50%;
  border: 1px solid rgba(0,204,163,0.12);
  animation: orbRingPulse 3s ease-in-out infinite 1.5s;
}
@keyframes orbRingPulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50%       { transform: scale(1.04); opacity: 0.9; }
}

/* State-specific orb styles */
body.listening #orb-ring  { border-color: var(--t); box-shadow: 0 0 20px var(--t-glow); animation: orbListen 0.8s ease-in-out infinite alternate; }
body.processing #orb-ring { border-color: var(--warn); box-shadow: 0 0 18px rgba(255,204,0,0.4); }
body.speaking   #orb-ring { border-color: var(--t-bright); box-shadow: 0 0 24px var(--t-glow); }
@keyframes orbListen {
  from { transform: scale(1); box-shadow: 0 0 15px var(--t-glow); }
  to   { transform: scale(1.06); box-shadow: 0 0 30px var(--t-glow2); }
}

/* State label */
#state-label {
  font-family: var(--font-hud);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: color 0.3s;
}
body.listening  #state-label { color: var(--t); }
body.processing #state-label { color: var(--warn); animation: blink 0.6s step-end infinite; }
body.speaking   #state-label { color: var(--t-bright); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Last transcript line */
#last-transcript {
  position: fixed;
  bottom: 170px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  max-width: 600px; width: 90%;
  text-align: center;
  font-size: 13px;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-weight: 300;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}
#last-transcript.visible { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL SYSTEM
══════════════════════════════════════════════════════════════════════════ */
#panels-container {
  position: fixed; inset: 0; z-index: 15;
  pointer-events: none;
}

.panel {
  position: absolute;
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--panel-r);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  box-shadow:
    0 0 30px rgba(0,204,163,0.08),
    0 0 1px rgba(0,204,163,0.3) inset,
    0 20px 60px rgba(0,0,0,0.6);
  pointer-events: all;
  min-width: 280px;
  max-width: 520px;
  overflow: hidden;
  transform-origin: center bottom;
  animation: panelOpen 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes panelOpen {
  0%   { opacity:0; transform: scale(0.88) translateY(12px); filter: blur(4px); }
  100% { opacity:1; transform: scale(1)    translateY(0);    filter: blur(0); }
}
.panel.closing {
  animation: panelClose 0.25s ease-in forwards;
}
@keyframes panelClose {
  0%   { opacity:1; transform: scale(1)    translateY(0)    filter: blur(0); }
  100% { opacity:0; transform: scale(0.90) translateY(8px); filter: blur(6px); }
}

/* Plasma border effect */
.panel::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--panel-r);
  background: conic-gradient(
    from var(--plasma-angle, 0deg),
    transparent 30%, var(--t-glow) 50%, transparent 70%
  );
  opacity: 0.15;
  pointer-events: none;
  animation: plasmaSpin 4s linear infinite;
}
@keyframes plasmaSpin {
  to { --plasma-angle: 360deg; }
}
@property --plasma-angle {
  syntax: '<angle>'; inherits: false; initial-value: 0deg;
}

/* Panel header */
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(0,204,163,0.15);
  background: rgba(0,204,163,0.05);
}
.panel-title {
  font-family: var(--font-hud);
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--t);
}
.panel-close {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(0,204,163,0.3);
  color: var(--t);
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
}
.panel-close:hover { background: rgba(255,68,85,0.2); border-color: var(--danger); color: var(--danger); transform: scale(1.1); }
.panel-body { padding: 14px; }

/* Scan line inside panel on open */
.panel-scan {
  position: absolute; left: 0; right: 0; top: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--t-bright), transparent);
  animation: panelScan 0.5s ease-out forwards;
  pointer-events: none;
}
@keyframes panelScan {
  0%   { top: 0; opacity: 0.8; }
  100% { top: 100%; opacity: 0; }
}

/* Drag handle */
.panel-header { cursor: grab; }
.panel-header:active { cursor: grabbing; }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — CHAT TRANSCRIPT
══════════════════════════════════════════════════════════════════════════ */
#panel-chat {
  width: 420px;
  max-height: 480px;
  top: 80px; left: 40px;
}
#chat-messages {
  display: flex; flex-direction: column;
  gap: 10px;
  max-height: 360px;
  overflow-y: auto;
  padding-right: 4px;
}
#chat-messages::-webkit-scrollbar { width: 3px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(0,204,163,0.3); border-radius: 2px; }

.chat-msg {
  display: flex; flex-direction: column;
  gap: 3px;
}
.chat-msg-role {
  font-family: var(--font-hud);
  font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase;
}
.chat-msg.user .chat-msg-role { color: var(--text-dim); }
.chat-msg.ami  .chat-msg-role { color: var(--t); }
.chat-msg-text {
  font-size: 13.5px; line-height: 1.6;
  font-weight: 400;
  padding: 8px 10px;
  border-radius: 4px;
}
.chat-msg.user .chat-msg-text {
  background: rgba(255,255,255,0.04);
  border-left: 2px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
}
.chat-msg.ami .chat-msg-text {
  background: var(--t-dim);
  border-left: 2px solid var(--t);
  color: var(--text-bright);
}
/* Text materializing effect */
.chat-msg.ami .chat-msg-text.typing {
  animation: textMaterialize 0.5s ease-out;
}
@keyframes textMaterialize {
  0%  { opacity: 0; letter-spacing: 2px; filter: blur(3px); }
  100%{ opacity: 1; letter-spacing: 0;   filter: blur(0); }
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — IMAGEN GENERADA
══════════════════════════════════════════════════════════════════════════ */
#panel-image {
  width: 380px;
  top: 80px; right: 40px;
}
#image-result {
  width: 100%;
  border-radius: 4px;
  border: 1px solid var(--panel-border);
  display: block;
  animation: imageReveal 0.6s ease-out;
}
@keyframes imageReveal {
  0%  { opacity: 0; filter: brightness(3) saturate(0); }
  50% { filter: brightness(1.5) saturate(0.5); }
  100%{ opacity: 1; filter: brightness(1) saturate(1); }
}
#image-hologram-overlay {
  position: absolute; inset: 14px; bottom: 14px;
  border-radius: 4px;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,204,163,0.04) 3px, rgba(0,204,163,0.04) 4px
  );
  pointer-events: none;
  animation: holoFlicker 6s step-end infinite;
}
@keyframes holoFlicker {
  0%,100%{ opacity:0.8 } 92%{ opacity:0.8 } 93%{ opacity:0.3 }
  94%{ opacity:0.8 } 96%{ opacity:0.5 } 97%{ opacity:0.8 }
}
#image-prompt-label {
  margin-top: 8px;
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.4;
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — CÁMARA
══════════════════════════════════════════════════════════════════════════ */
#panel-camera {
  width: 360px;
  top: 80px; right: 40px;
}
#camera-feed {
  width: 100%;
  border-radius: 4px;
  border: 1px solid var(--panel-border);
  background: #000;
  transform: scaleX(-1); /* Espejo */
}
#camera-snapshot {
  display: none;
  width: 100%;
  border-radius: 4px;
  margin-top: 8px;
}
#camera-status {
  font-family: var(--font-hud);
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--t);
  margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
#camera-status::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--t);
  animation: camDot 1s step-end infinite;
}
@keyframes camDot { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — BÚSQUEDA WEB
══════════════════════════════════════════════════════════════════════════ */
#panel-search {
  width: 460px;
  top: 80px; left: 40px;
  max-height: 520px;
}
#search-query-label {
  font-size: 11px; color: var(--text-dim);
  margin-bottom: 10px; font-style: italic;
}
.search-result {
  padding: 10px;
  border: 1px solid rgba(0,204,163,0.1);
  border-radius: 4px;
  margin-bottom: 8px;
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
}
.search-result:hover { border-color: var(--panel-border); background: var(--t-dim); }
.search-result-title { font-size: 13px; font-weight: 600; color: var(--t); margin-bottom: 2px; }
.search-result-url   { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 4px; }
.search-result-snippet{ font-size: 12px; line-height: 1.5; color: var(--text); }
#search-summary {
  padding: 10px;
  background: var(--t-dim);
  border-radius: 4px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-bright);
  margin-bottom: 10px;
  border-left: 2px solid var(--t);
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — SISTEMA
══════════════════════════════════════════════════════════════════════════ */
#panel-system {
  width: 320px;
  top: 80px; left: 40px;
}
.sys-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid rgba(0,204,163,0.07);
  font-size: 12px;
}
.sys-row:last-child { border-bottom: none; }
.sys-key   { color: var(--text-dim); font-size: 11px; }
.sys-value { color: var(--t-bright); font-family: var(--font-mono); font-size: 11px; }
.sys-bar {
  height: 4px; border-radius: 2px;
  background: rgba(0,204,163,0.15);
  margin-top: 3px;
  overflow: hidden;
}
.sys-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--t), var(--t-bright));
  transition: width 0.5s ease;
}
.sys-bar-fill.warn  { background: linear-gradient(90deg, var(--warn), #FF8800); }
.sys-bar-fill.danger{ background: linear-gradient(90deg, var(--danger), #FF8800); }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — VIDEO GENERADO
══════════════════════════════════════════════════════════════════════════ */
#panel-video {
  width: 420px;
  top: 80px; right: 40px;
}
#video-player {
  width: 100%;
  border-radius: 4px;
  border: 1px solid var(--panel-border);
  background: #000;
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — AUTOBIOGRAFÍA / PERFIL
══════════════════════════════════════════════════════════════════════════ */
#panel-profile {
  width: 400px;
  top: 80px; left: 50%; transform: translateX(-50%);
  max-height: 500px;
}
#profile-text {
  font-size: 12.5px; line-height: 1.7;
  color: var(--text);
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
}
#profile-text::-webkit-scrollbar { width: 3px; }
#profile-text::-webkit-scrollbar-thumb { background: rgba(0,204,163,0.3); }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — TRADUCCIÓN
══════════════════════════════════════════════════════════════════════════ */
#panel-translate {
  width: 380px;
  top: 80px; right: 40px;
}
#translate-source { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-style: italic; }
#translate-result {
  font-size: 16px; line-height: 1.7;
  color: var(--text-bright);
  padding: 10px;
  background: var(--t-dim);
  border-radius: 4px;
  border-left: 2px solid var(--t);
}
#translate-lang { font-family: var(--font-hud); font-size: 9px; letter-spacing: 2px; color: var(--t); margin-top: 6px; }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — MÚSICA GENERADA
══════════════════════════════════════════════════════════════════════════ */
#panel-music {
  width: 340px;
  bottom: 160px; left: 40px;
}
#music-title { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 4px; }
#music-desc  { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
#music-player { width: 100%; }
.music-wave-container {
  height: 40px;
  background: rgba(0,204,163,0.05);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — RAZONAMIENTO PROFUNDO
══════════════════════════════════════════════════════════════════════════ */
#panel-reasoning {
  width: 480px;
  top: 80px; left: 50%; transform: translateX(-50%);
  max-height: 540px;
}
#reasoning-thinking {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text-dim); line-height: 1.6;
  max-height: 180px; overflow-y: auto;
  padding: 8px; background: rgba(0,0,0,0.3);
  border-radius: 4px; margin-bottom: 10px;
  border-left: 2px solid rgba(0,204,163,0.2);
}
#reasoning-conclusion {
  font-size: 13.5px; line-height: 1.7;
  color: var(--text-bright);
  max-height: 240px; overflow-y: auto;
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — MODELO 3D (visor Three.js interno)
══════════════════════════════════════════════════════════════════════════ */
#panel-3d {
  width: 400px;
  top: 80px; right: 40px;
}
#model3d-viewer {
  width: 100%; height: 280px;
  border-radius: 4px;
  background: radial-gradient(ellipse at center, rgba(0,204,163,0.05) 0%, rgba(0,0,0,0.5) 100%);
  border: 1px solid var(--panel-border);
  cursor: grab;
}
#model3d-viewer:active { cursor: grabbing; }

/* ═══════════════════════════════════════════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════════════════════════════════════════════ */
#notifications {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  pointer-events: none;
}
.notif {
  font-family: var(--font-hud);
  font-size: 11px; letter-spacing: 1.5px;
  padding: 8px 18px;
  border-radius: 4px;
  backdrop-filter: blur(12px);
  animation: notifIn 0.3s ease-out, notifOut 0.3s ease-in 2.7s forwards;
  pointer-events: none;
}
.notif.info    { background: rgba(0,204,163,0.15); border: 1px solid rgba(0,204,163,0.3); color: var(--t); }
.notif.warning { background: rgba(255,204,0,0.15); border: 1px solid rgba(255,204,0,0.4); color: var(--warn); }
.notif.error   { background: rgba(255,68,85,0.15);  border: 1px solid rgba(255,68,85,0.4);  color: var(--danger); }
@keyframes notifIn  { from{ opacity:0; transform:translateY(-10px); } to{ opacity:1; transform:translateY(0); } }
@keyframes notifOut { from{ opacity:1; } to{ opacity:0; transform:translateY(-8px); } }

/* ═══════════════════════════════════════════════════════════════════════
   SETUP SCREEN
══════════════════════════════════════════════════════════════════════════ */
#setup-screen {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(ellipse at center, #061712 0%, var(--bg) 70%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px;
  transition: opacity 0.8s, visibility 0.8s;
}
#setup-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.setup-logo {
  font-family: var(--font-hud);
  font-size: 64px;
  font-weight: 900;
  letter-spacing: 12px;
  color: var(--t);
  text-shadow: 0 0 40px var(--t-glow), 0 0 80px rgba(0,204,163,0.2);
  animation: logoGlow 3s ease-in-out infinite alternate;
}
@keyframes logoGlow {
  from { text-shadow: 0 0 30px var(--t-glow), 0 0 60px rgba(0,204,163,0.15); }
  to   { text-shadow: 0 0 50px var(--t-glow), 0 0 100px rgba(0,204,163,0.3), 0 0 150px rgba(0,204,163,0.1); }
}
.setup-subtitle {
  font-family: var(--font-hud);
  font-size: 11px; letter-spacing: 6px;
  color: var(--text-dim);
  text-align: center;
  margin-top: -20px;
}

.setup-form {
  display: flex; flex-direction: column;
  gap: 16px;
  width: 380px;
}
.setup-field {
  display: flex; flex-direction: column; gap: 6px;
}
.setup-label {
  font-family: var(--font-hud);
  font-size: 9px; letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--t);
}
.setup-input {
  background: rgba(0,204,163,0.06);
  border: 1px solid var(--panel-border);
  border-radius: 4px;
  padding: 10px 14px;
  color: var(--text-bright);
  font-family: var(--font-mono);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.setup-input:focus { border-color: var(--t); box-shadow: 0 0 12px var(--t-glow); }
.setup-input::placeholder { color: rgba(184,237,228,0.25); }

.setup-btn {
  padding: 13px;
  background: linear-gradient(135deg, rgba(0,204,163,0.2) 0%, rgba(0,255,224,0.1) 100%);
  border: 1px solid var(--t);
  border-radius: 4px;
  color: var(--t-bright);
  font-family: var(--font-hud);
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase;
  transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
  margin-top: 8px;
}
.setup-btn:hover {
  background: linear-gradient(135deg, rgba(0,204,163,0.35) 0%, rgba(0,255,224,0.2) 100%);
  box-shadow: 0 0 20px var(--t-glow);
  transform: translateY(-1px);
}
.setup-btn:active { transform: translateY(0); }
.setup-note {
  font-size: 11px; color: var(--text-dim);
  text-align: center;
  line-height: 1.6;
}
.setup-note a { color: var(--t); text-decoration: none; }

/* ═══════════════════════════════════════════════════════════════════════
   INDICADOR DE MICRÓFONO / VAD
══════════════════════════════════════════════════════════════════════════ */
#vad-indicator {
  position: fixed;
  bottom: 135px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex; gap: 3px; align-items: flex-end;
  height: 30px;
  pointer-events: none;
}
.vad-bar {
  width: 3px; border-radius: 2px;
  background: var(--t);
  opacity: 0.4;
  transition: height 0.05s, opacity 0.05s;
  min-height: 4px;
}

/* ═══════════════════════════════════════════════════════════════════════
   LOADER / THINKING INDICATOR
══════════════════════════════════════════════════════════════════════════ */
#thinking-dots {
  position: fixed;
  bottom: 170px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: none;
  gap: 6px;
}
#thinking-dots.visible { display: flex; }
.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--t);
  animation: thinkDot 1.2s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkDot {
  0%,100%{ transform:scale(0.6); opacity:0.3; }
  50%    { transform:scale(1.2); opacity:1; }
}

/* ═══════════════════════════════════════════════════════════════════════
   AMI HEADER (nombre en esquina superior centro)
══════════════════════════════════════════════════════════════════════════ */
#ami-header {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
}
#ami-name {
  font-family: var(--font-hud);
  font-size: 18px; font-weight: 700;
  letter-spacing: 8px;
  color: var(--t);
  text-shadow: 0 0 20px var(--t-glow);
}
#ami-version {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 2px;
  color: var(--text-dim);
  text-align: center;
}

/* ═══════════════════════════════════════════════════════════════════════
   EDGE GLOW (cuando escucha activamente)
══════════════════════════════════════════════════════════════════════════ */
#edge-glow {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
  box-shadow: inset 0 0 80px rgba(0,204,163,0);
  transition: box-shadow 0.5s ease;
}
body.listening #edge-glow { box-shadow: inset 0 0 80px rgba(0,204,163,0.07); }
body.speaking  #edge-glow { box-shadow: inset 0 0 80px rgba(0,255,224,0.08); }

/* ═══════════════════════════════════════════════════════════════════════
   SCROLLBAR GLOBAL
══════════════════════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,204,163,0.25); border-radius: 2px; }

/* ═══════════════════════════════════════════════════════════════════════
   GLITCH EFFECT (para errores / transiciones especiales)
══════════════════════════════════════════════════════════════════════════ */
.glitch {
  animation: glitchAnim 0.4s steps(2) forwards;
}
@keyframes glitchAnim {
  0%   { clip-path: inset(0 0 95% 0); transform: translate(-2px, 0); }
  20%  { clip-path: inset(40% 0 50% 0); transform: translate(2px, 0); }
  40%  { clip-path: inset(70% 0 20% 0); transform: translate(-1px, 0); }
  60%  { clip-path: inset(10% 0 80% 0); transform: translate(1px, 0); }
  80%  { clip-path: inset(60% 0 30% 0); transform: translate(-2px, 0); }
  100% { clip-path: inset(0); transform: translate(0); }
}

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — PLANIFICACIÓN
══════════════════════════════════════════════════════════════════════════ */
.plan-filters {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
}
.plan-filter-btn {
  font-family: var(--font-hud); font-size: 9px; letter-spacing: 1.5px;
  padding: 4px 10px; border-radius: 3px;
  border: 1px solid rgba(0,204,163,0.25);
  color: var(--text-dim); background: none; cursor: pointer; transition: all 0.15s;
}
.plan-filter-btn:hover, .plan-filter-btn.active {
  border-color: var(--t); color: var(--t); background: rgba(0,204,163,0.08);
}
.plan-progress-wrap { margin-bottom: 12px; }
.plan-progress-label {
  font-family: var(--font-hud); font-size: 8px; letter-spacing: 1.5px;
  color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 4px;
}
.plan-progress-bar {
  height: 3px; background: rgba(0,204,163,0.12); border-radius: 2px; overflow: hidden;
}
.plan-progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--t), var(--t-bright));
  border-radius: 2px; transition: width 0.4s ease;
}
.plan-task {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid rgba(0,204,163,0.07); transition: background 0.15s;
}
.plan-task:last-child { border-bottom: none; }
.plan-task.done .plan-task-text { text-decoration: line-through; opacity: 0.4; }
.plan-checkbox {
  flex-shrink: 0; width: 16px; height: 16px;
  border: 1px solid rgba(0,204,163,0.4); border-radius: 3px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all 0.2s; background: none;
}
.plan-checkbox:hover { border-color: var(--t); background: rgba(0,204,163,0.1); }
.plan-task.done .plan-checkbox { background: var(--t); border-color: var(--t); }
.plan-task.done .plan-checkbox::after { content: '✓'; font-size: 9px; color: #000; font-weight: 700; }
.plan-task-body { flex: 1; min-width: 0; }
.plan-task-text { font-size: 13px; line-height: 1.5; color: var(--text); }
.plan-task-meta { display: flex; gap: 8px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
.plan-priority {
  font-family: var(--font-hud); font-size: 8px; letter-spacing: 1px;
  padding: 1px 6px; border-radius: 2px;
}
.plan-priority.alta  { background: rgba(255,68,85,0.15);  color: var(--danger); border: 1px solid rgba(255,68,85,0.3); }
.plan-priority.media { background: rgba(255,204,0,0.12);  color: var(--warn);   border: 1px solid rgba(255,204,0,0.3); }
.plan-priority.baja  { background: rgba(0,204,163,0.10);  color: var(--t);      border: 1px solid rgba(0,204,163,0.25); }
.plan-task-date { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
.plan-task-cat  { font-size: 10px; color: var(--text-dim); }
.plan-delete-btn {
  flex-shrink: 0; font-size: 10px; color: rgba(255,68,85,0.35);
  border: none; background: none; cursor: pointer; padding: 2px 4px;
  border-radius: 2px; transition: color 0.15s;
}
.plan-delete-btn:hover { color: var(--danger); }
.plan-add-row {
  display: flex; gap: 8px; align-items: center; margin-top: 12px;
  padding-top: 10px; border-top: 1px solid rgba(0,204,163,0.1);
}
.plan-add-input {
  flex: 1; background: rgba(0,204,163,0.06); border: 1px solid rgba(0,204,163,0.2);
  border-radius: 4px; padding: 7px 10px; color: var(--text-bright);
  font-family: var(--font-body); font-size: 12px; outline: none; transition: border-color 0.2s;
}
.plan-add-input:focus { border-color: var(--t); }
.plan-add-input::placeholder { color: rgba(184,237,228,0.2); }
.plan-add-btn {
  font-family: var(--font-hud); font-size: 9px; letter-spacing: 1.5px;
  padding: 7px 12px; border-radius: 4px; border: 1px solid var(--t);
  color: var(--t); background: none; cursor: pointer; transition: all 0.2s;
}
.plan-add-btn:hover { background: rgba(0,204,163,0.12); box-shadow: 0 0 10px var(--t-glow); }
.plan-empty {
  text-align: center; padding: 28px 16px; color: var(--text-dim);
  font-size: 13px; line-height: 1.8;
}
.plan-empty span { color: var(--t); font-size: 12px; }
.plan-section-title {
  font-family: var(--font-hud); font-size: 8px; letter-spacing: 2px;
  color: var(--text-dim); margin: 12px 0 4px; text-transform: uppercase;
}
/* ═══════════════════════════════════════════════════════════════════════
   UTILITY
══════════════════════════════════════════════════════════════════════════ */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.gap-8 { gap: 8px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.text-center { text-align: center; }
.text-t { color: var(--t); }
.text-dim { color: var(--text-dim); }
.font-hud { font-family: var(--font-hud); }
.font-mono { font-family: var(--font-mono); }
.text-xs { font-size: 10px; letter-spacing: 1px; }
.spin { animation: spin360 1s linear infinite; }
@keyframes spin360 { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════════════════
   PANEL — TIME TRACKER
══════════════════════════════════════════════════════════════════════════ */
.time-session {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(0,204,163,0.08);
  font-size: 12px;
}
.time-session:last-child { border-bottom: none; }
.time-session-label { color: var(--text); font-size: 12px; }
.time-session-dur   { color: var(--t); font-family: var(--font-mono); font-size: 11px; }
.time-bar-wrap { margin: 4px 0 12px; }
.time-bar { height: 3px; background: rgba(0,204,163,0.12); border-radius:2px; overflow:hidden; }
.time-bar-fill { height:100%; background: linear-gradient(90deg, var(--t), var(--t-bright)); border-radius:2px; }
.time-total { font-family: var(--font-hud); font-size:11px; letter-spacing:1.5px; color: var(--t-bright); }

/* ═══════════════════════════════════════════════════════════════════════
   MOBILE — RESPONSIVE LAYOUT
   Aplica en pantallas ≤ 768px (celulares y tablets pequeñas)
══════════════════════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* ─── Variables mobile ─── */
  :root {
    --panel-r: 10px;
    --scan-speed: 12s;
  }

  /* ─── HUD corners: más pequeños y reposicionados ─── */
  .hud-corner {
    font-size: 8px;
    line-height: 1.6;
  }
  #hud-tl { top: 10px; left: 10px; }
  #hud-tr { top: 10px; right: 10px; }
  #hud-bl { bottom: 10px; left: 10px; }
  #hud-br { bottom: 10px; right: 10px; }
  /* En mobile ocultamos CPU/MEM del HUD — demasiado pequeño */
  #hud-cpu, #hud-mem { display: none; }

  /* ─── Header AMI centrado, ajustado ─── */
  #ami-name { font-size: 14px; letter-spacing: 5px; }
  #ami-version { font-size: 8px; letter-spacing: 1.5px; }

  /* ─── Orb más grande y táctil ─── */
  #core {
    bottom: 28px;
    gap: 10px;
  }
  #orb-container { width: 90px; height: 90px; }
  #orb-canvas    { width: 90px; height: 90px; }
  #orb-ring      { inset: -7px; }
  #orb-ring2     { inset: -14px; }

  /* ─── State label ─── */
  #state-label { font-size: 8px; letter-spacing: 2.5px; }

  /* ─── Transcript y thinking ─── */
  #last-transcript {
    bottom: 160px;
    font-size: 12px;
    max-width: 88%;
  }
  #thinking-dots { bottom: 155px; }
  #vad-indicator { bottom: 128px; }

  /* ─── PANELES MOBILE:
         - Full width casi (92vw)
         - Siempre centrados horizontalmente
         - Apilados desde arriba
         - No draggable en mobile (se ignora el handler)
  ─── */
  .panel {
    position: fixed !important;
    width: 92vw !important;
    max-width: 92vw !important;
    min-width: 0 !important;
    left: 4vw !important;
    right: 4vw !important;
    top: 60px !important;
    max-height: 60vh !important;
    overflow-y: auto !important;
  }
  /* Cuando hay múltiples paneles, se solapan — el usuario puede cerrarlos por voz */
  .panel:nth-child(2) { top: 70px !important; }
  .panel:nth-child(3) { top: 80px !important; }

  /* ─── Panel body scroll ─── */
  .panel-body { padding: 12px 10px; max-height: calc(60vh - 50px); overflow-y: auto; }

  /* ─── Panel header: botón de cerrar más grande para touch ─── */
  .panel-header { padding: 12px 14px; cursor: default; }
  .panel-close  { width: 24px; height: 24px; font-size: 12px; }
  .panel-title  { font-size: 9px; letter-spacing: 2px; }

  /* ─── Chat: altura adaptada ─── */
  #chat-messages { max-height: 42vh; }
  .chat-msg-text { font-size: 13px; }

  /* ─── Setup screen mobile ─── */
  .setup-logo     { font-size: 44px; letter-spacing: 8px; }
  .setup-subtitle { font-size: 9px;  letter-spacing: 3px; }
  .setup-form     { width: 88vw; }
  .setup-input    { font-size: 14px; padding: 12px 14px; } /* más fácil de tipear */
  .setup-btn      { padding: 15px; font-size: 12px; }

  /* ─── Notificaciones centradas ─── */
  #notifications {
    top: 12px;
    width: 88vw;
    left: 6vw;
    transform: none;
  }
  .notif { font-size: 10px; padding: 7px 14px; width: 100%; text-align: center; }

  /* ─── Paneles específicos: anular anchos fijos ─── */
  #panel-chat, #panel-image, #panel-camera,
  #panel-search, #panel-system, #panel-video,
  #panel-profile, #panel-translate, #panel-music,
  #panel-reasoning, #panel-3d {
    width: 92vw !important;
  }

  /* ─── 3D viewer altura menor en mobile ─── */
  #model3d-viewer { height: 200px; }

  /* ─── Búsqueda: resultados más compactos ─── */
  .search-result-title  { font-size: 12px; }
  .search-result-url    { font-size: 9px; }
  .search-result-snippet{ font-size: 11px; }

  /* ─── Tasks / planificación ─── */
  .plan-task-text { font-size: 12px; }
  .plan-filter-btn { font-size: 8px; padding: 4px 8px; }

  /* ─── Ocultar scan-beam en mobile (innecesario) ─── */
  #scan-beam { display: none; }
}

/* Mobile muy pequeño (≤ 380px) */
@media (max-width: 380px) {
  .setup-logo  { font-size: 36px; letter-spacing: 6px; }
  #ami-name    { font-size: 12px; letter-spacing: 4px; }
  #orb-container { width: 76px; height: 76px; }
  #orb-canvas    { width: 76px; height: 76px; }
  .panel { top: 54px !important; }
}
</style>
</head>
<body>

<!-- Three.js canvas de fondo -->
<canvas id="three-canvas"></canvas>
<div id="bg-noise"></div>

<!-- Overlay de scanlines -->
<div id="scanlines"></div>
<div id="scan-beam"></div>
<div id="edge-glow"></div>

<!-- HUD Corners -->
<div id="hud-tl" class="hud-corner">
  <div><span class="hud-label">SISTEMA </span><span class="hud-val" id="hud-status">ACTIVO</span></div>
  <div><span class="hud-label">CPU </span><span class="hud-val" id="hud-cpu">—</span></div>
  <div><span class="hud-label">MEM </span><span class="hud-val" id="hud-mem">—</span></div>
</div>
<div id="hud-tr" class="hud-corner">
  <div><span class="hud-val" id="hud-time">00:00:00</span></div>
  <div><span class="hud-val" id="hud-date">—</span></div>
  <div><span class="hud-label">UY </span><span class="hud-val">MVD</span></div>
</div>
<div id="hud-bl" class="hud-corner">
  <div><span class="hud-label">BRIDGE </span><span class="hud-val" id="hud-bridge">DESCONECTADO</span></div>

</div>

  <div><span class="hud-label">MEMORIA </span><span class="hud-val" id="hud-memory">—</span></div>
</div>

<!-- Header -->
<div id="ami-header">
  <div id="ami-name">AMI</div>
  <div id="ami-version">ASISTENTE PERSONAL · v1.0</div>
</div>

<!-- Notifications -->
<div id="notifications"></div>

<!-- Thinking dots -->
<div id="thinking-dots">
  <div class="t-dot"></div>
  <div class="t-dot"></div>
  <div class="t-dot"></div>
</div>

<!-- Última transcripción del usuario -->
<div id="last-transcript"></div>

<!-- Core - Orb central + VAD + estado -->
<div id="core">
  <div id="orb-container">
    <div id="orb-ring2"></div>
    <div id="orb-ring"></div>
    <canvas id="orb-canvas" width="80" height="80"></canvas>
  </div>
  <div id="state-label">INICIANDO</div>
</div>

<!-- VAD bars -->
<div id="vad-indicator">
  <!-- Generado por JS -->
</div>

<!-- Panels container -->
<div id="panels-container"></div>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-logo">AMI</div>
  <div class="setup-subtitle">ASISTENTE PERSONAL DE INTELIGENCIA ARTIFICIAL</div>

  <div class="setup-form">
    <div class="setup-field">
      <label class="setup-label">API Key — AI/ML API</label>
      <input type="password" id="setup-aiml-key" class="setup-input"
             placeholder="sk-..." autocomplete="off" />
    </div>
    <button class="setup-btn" id="setup-start-btn">⬡ INICIAR AMI</button>
  </div>

  <div class="setup-note">
    Obtenés tu API key en <a href="https://aimlapi.com" target="_blank">aimlapi.com</a>
  </div>
</div>

<!-- Firebase SDK (compat v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// ─── buildSystemPrompt: inyecta contexto dinámico en cada llamada ──────
function buildSystemPrompt(extraNote = '') {
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-UY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const timeStr = now.toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' });

  let ctx = SYSTEM_PROMPT_BASE;

  // ── Fecha y hora actual ──
  ctx += `\n\nCONTEXTO ACTUAL:\nFecha: ${dateStr} | Hora: ${timeStr}`;

  // ── Estado de ánimo reciente ──
  if (STATE.lastMood && STATE.lastMood !== 'neutro') {
    ctx += `\nEstado de ánimo detectado recientemente: ${STATE.lastMood}.`;
  }

  // ── Tareas pendientes de alta prioridad ──
  const highPrio = (STATE.tasks || []).filter(t => !t.done && t.priority === 'alta');
  const dueToday = (STATE.tasks || []).filter(t => {
    if (t.done) return false;
    const today = new Date().toISOString().slice(0,10);
    return t.dueDate === today;
  });
  const overdue = (STATE.tasks || []).filter(t => {
    if (t.done || !t.dueDate) return false;
    return t.dueDate < new Date().toISOString().slice(0,10);
  });

  if (highPrio.length > 0 || dueToday.length > 0 || overdue.length > 0) {
    ctx += `\n\nTAREAS RELEVANTES DEL USUARIO:`;
    if (overdue.length > 0) ctx += `\n[VENCIDAS] ${overdue.map(t => t.text).join('; ')}`;
    if (dueToday.length > 0) ctx += `\n[PARA HOY] ${dueToday.map(t => t.text).join('; ')}`;
    if (highPrio.length > 0) ctx += `\n[ALTA PRIORIDAD] ${highPrio.map(t => t.text).join('; ')}`;
    ctx += `\n(Podés mencionar estas tareas cuando sea relevante en la conversación, pero sin forzarlo.)`;
  }

  // ── Autobiografía reciente (últimas 8 entradas) ──
  if (STATE.autobiography && STATE.autobiography.trim().length > 10) {
    const entries = STATE.autobiography.split('\n').filter(Boolean);
    const recent = entries.slice(-8).join('\n');
    ctx += `\n\nLO QUE APRENDISTE DE IMA (memoria autobiográfica reciente):\n${recent}`;
  }

  if (extraNote) ctx += `\n\n${extraNote}`;
  return ctx;
}

function initFirebase() {

    const cfg = JSON.parse(atob(CONFIG._fb));

  } catch (e) {
    console.warn('[AMI] Firebase error:', e);

}

async function saveConversation(messages) {
  // Firebase (global, todos los dispositivos)
  if (STATE.db) {
    try {
      await STATE.db.collection('ami_memory').doc('imanol').set({
        conv_history: STATE.conversationHistory.slice(-60),
        last_updated: new Date().toISOString()
      }, { merge: true });
    } catch (e) { console.warn('[AMI] Firebase save conv error:', e); }
  }
  // localStorage como respaldo
  try {
    localStorage.setItem('ami_conv', JSON.stringify(STATE.conversationHistory.slice(-40)));
  } catch (e) {}
}

async function loadConversationHistory() {
  // Intentar Firebase primero
  if (STATE.db) {
    try {
      const doc = await STATE.db.collection('ami_memory').doc('imanol').get();
      if (doc.exists) {
        const data = doc.data();
        if (data.conv_history?.length > 0) {
          STATE.conversationHistory = data.conv_history;
          setHudValue('hud-turns', Math.floor(data.conv_history.length / 2));
          console.log('[AMI] Historial cargado desde Firebase:', data.conv_history.length, 'mensajes');
          return;
        }
      }
    } catch (e) { console.warn('[AMI] Firebase load conv error:', e); }
  }
  // Fallback localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('ami_conv') || '[]');
    if (saved.length > 0) {
      STATE.conversationHistory = saved;
      setHudValue('hud-turns', Math.floor(saved.length / 2));
    }
  } catch (e) {}
}

function saveConvLocal() {
  // Guardar en Firebase + localStorage en background
  saveConversation(STATE.conversationHistory);
}

async function loadAutobiography() {
  // Intentar Firebase primero
  if (STATE.db) {
    try {

      if (doc.exists && doc.data().autobiography) {

async function updateAutobiography(newFact) {

// ═══════════════════════════════════════════════════════════════════════
//  THREE.JS — BACKGROUND PARTICLES
// ═══════════════════════════════════════════════════════════════════════

let threeScene, threeCamera, threeRenderer;
let particleMesh, particlePositions, particleBasePositions;
let threeAudioLevel = 0;

function initThree() {
  const canvas = document.getElementById('three-canvas');
  threeScene    = new THREE.Scene();
  threeCamera   = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  threeCamera.position.z = 80;

  threeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  threeRenderer.setSize(window.innerWidth, window.innerHeight);
  threeRenderer.setClearColor(0x000000, 0);

  // Partículas en esfera
  const COUNT = 2200;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(COUNT * 3);
  const colors    = new Float32Array(COUNT * 3);
  particleBasePositions = new Float32Array(COUNT * 3);

  const color = new THREE.Color();
  for (let i = 0; i < COUNT; i++) {
    const i3 = i * 3;
    // Distribución esférica
    const theta  = Math.random() * Math.PI * 2;
    const phi    = Math.acos(2 * Math.random() - 1);
    const radius = 30 + Math.random() * 20;
    positions[i3]   = particleBasePositions[i3]   = radius * Math.sin(phi) * Math.cos(theta);
    positions[i3+1] = particleBasePositions[i3+1] = radius * Math.sin(phi) * Math.sin(theta);
    positions[i3+2] = particleBasePositions[i3+2] = radius * Math.cos(phi);

    // Colores: turquesa con variación
    const bright = 0.3 + Math.random() * 0.7;
    color.setHSL(0.47 + Math.random() * 0.05, 1, bright * 0.5);
    colors[i3]   = color.r;
    colors[i3+1] = color.g;
    colors[i3+2] = color.b;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  particlePositions = positions;

  const material = new THREE.PointsMaterial({
    size: 0.5, vertexColors: true, transparent: true,
    opacity: 0.6, sizeAttenuation: true
  });

  particleMesh = new THREE.Points(geometry, material);
  threeScene.add(particleMesh);

  // Líneas de conexión decorativas (grid sutil)
  addGridLines();

  window.addEventListener('resize', onThreeResize);
  animateThree();
}

function addGridLines() {
  const mat = new THREE.LineBasicMaterial({ color: 0x00CCA3, opacity: 0.04, transparent: true });
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const geom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(Math.cos(angle)*50, -60, Math.sin(angle)*50),
      new THREE.Vector3(Math.cos(angle)*50,  60, Math.sin(angle)*50),
    ]);
    threeScene.add(new THREE.Line(geom, mat));
  }
}

let threeTime = 0;
function animateThree() {
  requestAnimationFrame(animateThree);
  threeTime += 0.005;

  // Rotación suave
  particleMesh.rotation.y = threeTime * 0.15;
  particleMesh.rotation.x = Math.sin(threeTime * 0.08) * 0.1;

  // Reacción al audio
  const audioScale = 1 + threeAudioLevel * 1.8;
  const pos = particleMesh.geometry.attributes.position;
  for (let i = 0; i < particlePositions.length / 3; i++) {
    const i3 = i * 3;
    const wave = Math.sin(threeTime * 2 + i * 0.05) * 0.3 * threeAudioLevel;
    pos.array[i3]   = particleBasePositions[i3]   * audioScale + wave;
    pos.array[i3+1] = particleBasePositions[i3+1] * audioScale + wave;
    pos.array[i3+2] = particleBasePositions[i3+2] * audioScale;
  }
  pos.needsUpdate = true;

  particleMesh.material.opacity = 0.35 + threeAudioLevel * 0.4;
  threeRenderer.render(threeScene, threeCamera);
}

function onThreeResize() {
  threeCamera.aspect = window.innerWidth / window.innerHeight;
  threeCamera.updateProjectionMatrix();
  threeRenderer.setSize(window.innerWidth, window.innerHeight);
}

// ═══════════════════════════════════════════════════════════════════════
//  ORB CANVAS — Visualizador central
// ═══════════════════════════════════════════════════════════════════════

let orbCtx, orbAnimFrame;

function initOrbCanvas() {
  const canvas = document.getElementById('orb-canvas');
  orbCtx = canvas.getContext('2d');
  animateOrb();
}

let orbTime = 0;
function animateOrb() {
  orbAnimFrame = requestAnimationFrame(animateOrb);
  orbTime += 0.03;
  const ctx = orbCtx;
  const cx = 40, cy = 40, r = 32;
  ctx.clearRect(0, 0, 80, 80);

  const phase = STATE.phase;
  const level = threeAudioLevel;

  // Fondo del orb
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  if (phase === 'listening') {
    grad.addColorStop(0, `rgba(0,204,163,${0.2 + level * 0.4})`);
    grad.addColorStop(1, 'rgba(0,204,163,0.02)');
  } else if (phase === 'speaking') {
    grad.addColorStop(0, `rgba(0,255,224,${0.25 + level * 0.5})`);
    grad.addColorStop(1, 'rgba(0,255,224,0.02)');
  } else if (phase === 'processing') {
    const t = (Math.sin(orbTime * 4) + 1) / 2;
    grad.addColorStop(0, `rgba(255,204,0,${0.1 + t * 0.2})`);
    grad.addColorStop(1, 'rgba(255,204,0,0.01)');
  } else {
    grad.addColorStop(0, 'rgba(0,180,140,0.12)');
    grad.addColorStop(1, 'rgba(0,180,140,0.01)');
  }
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Onda de audio alrededor del orb
  if (phase === 'listening' || phase === 'speaking') {
    ctx.beginPath();
    const bars = 48;
    for (let i = 0; i <= bars; i++) {
      const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
      const noise = Math.sin(orbTime * 6 + i * 0.4) * level * 10 + 2;
      const rr = r + 2 + noise;
      const x = cx + Math.cos(angle) * rr;
      const y = cy + Math.sin(angle) * rr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = phase === 'speaking' ? 'rgba(0,255,224,0.7)' : 'rgba(0,204,163,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Spinner cuando procesa
  if (phase === 'processing') {
    ctx.beginPath();
    ctx.arc(cx, cy, r - 4, orbTime * 3, orbTime * 3 + Math.PI * 1.5);
    ctx.strokeStyle = 'rgba(255,204,0,0.7)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Punto central
  ctx.beginPath();
  ctx.arc(cx, cy, 4 + level * 6, 0, Math.PI * 2);
  const cGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 8);
  cGrad.addColorStop(0, phase === 'speaking' ? '#00FFE0' : '#00CCA3');
  cGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = cGrad;
  ctx.fill();
}

function initVadBars() {
  const container = document.getElementById('vad-indicator');
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const bar = document.createElement('div');
    bar.className = 'vad-bar';
    bar.id = `vad-bar-${i}`;
    bar.style.height = '4px';
    container.appendChild(bar);
  }
}

function updateVadBars(freqData) {
  for (let i = 0; i < 20; i++) {
    const bar = document.getElementById(`vad-bar-${i}`);
    if (!bar) continue;
    const value = freqData[i * 3] / 255;
    const h = 4 + value * 26;
    bar.style.height = h + 'px';
    bar.style.opacity = 0.3 + value * 0.7;
    bar.style.background = value > 0.6 ? 'var(--t-bright)' : 'var(--t)';
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  AUDIO — WEB AUDIO API + VAD + GRABACIÓN
// ═══════════════════════════════════════════════════════════════════════

async function initAudio() {
  try {
    STATE.mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
    });

    STATE.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = STATE.audioContext.createMediaStreamSource(STATE.mediaStream);
    STATE.analyser = STATE.audioContext.createAnalyser();
    STATE.analyser.fftSize = 256;
    STATE.analyser.smoothingTimeConstant = 0.7;
    source.connect(STATE.analyser);
    startVadLoop();

    // Web Speech API para transcripción
    const ok = initWebSpeech();
    if (!ok) showNotif('Chrome/Edge recomendado para reconocimiento de voz', 'warning');

    console.log('[AMI] Audio inicializado.');
    return true;
  } catch (e) {
    console.error('[AMI] Error accediendo al micrófono:', e);
    showNotif('Error: no se puede acceder al micrófono', 'error');
    return false;
  }
}

let webSpeechRecognition = null;
let webSpeechActive = false;

function initWebSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;

  function createRecognition() {
    const r = new SR();
    r.lang = 'es-419';
    r.continuous = false;      // false es más estable — reinicia solo
    r.interimResults = false;
    r.maxAlternatives = 1;

    r.onresult = (event) => {
      const result = event.results[event.results.length - 1];
      if (!result.isFinal) return;
      const transcript = result[0].transcript.trim();
      if (!transcript || STATE.isSpeaking || STATE.phase === 'processing') return;
      processTranscript(transcript);
    };

    r.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      console.warn('[AMI] WebSpeech error:', e.error);
    };

    r.onend = () => {
      webSpeechActive = false;
      if (STATE.phase !== 'processing' && !STATE.isSpeaking) {
        setTimeout(startWebSpeech, 200);
      }
    };

    return r;
  }

  function startWebSpeech() {
    if (webSpeechActive || STATE.isSpeaking || STATE.phase === 'processing') return;
    try {
      webSpeechRecognition = createRecognition();
      webSpeechRecognition.start();
      webSpeechActive = true;
    } catch(e) {
      console.warn('[AMI] WebSpeech start error:', e);
      setTimeout(startWebSpeech, 1000);
    }
  }

  // Exponer para pausar/reanudar
  window._startWebSpeech = startWebSpeech;

  startWebSpeech();
  return true;
}

function pauseWebSpeech() {
  webSpeechActive = false;
  try { webSpeechRecognition?.abort(); } catch(e) {}
}

function resumeWebSpeech() {
  setTimeout(() => {
    if (window._startWebSpeech) window._startWebSpeech();
  }, 500);
}

function startVadLoop() {
  const bufferLength = STATE.analyser.frequencyBinCount;
  const dataArray    = new Uint8Array(bufferLength);
  const timeArray    = new Uint8Array(STATE.analyser.fftSize);

  function tick() {
    STATE.analyser.getByteFrequencyData(dataArray);
    STATE.analyser.getByteTimeDomainData(timeArray);
    updateVadBars(dataArray);

    let sum = 0;
    for (let i = 0; i < timeArray.length; i++) {
      const v = (timeArray[i] / 128.0) - 1.0;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / timeArray.length);
    threeAudioLevel = rms * 3;

    // Solo visual — Web Speech API maneja el STT
    if (rms > CONFIG.vad.threshold && STATE.phase === 'idle') setPhase('listening');
    else if (rms <= CONFIG.vad.threshold && STATE.phase === 'listening') setPhase('idle');

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function startRecording() {
  if (STATE.isRecording || !STATE.mediaStream) return;
  STATE.isRecording = true;
  STATE.speechStartTime = Date.now();
  STATE.recordingChunks = [];

  setPhase('listening');

  try {
    STATE.mediaRecorder = new MediaRecorder(STATE.mediaStream, {
      mimeType: 'audio/webm;codecs=opus'
    });
  } catch {
    STATE.mediaRecorder = new MediaRecorder(STATE.mediaStream);
  }

  STATE.mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) STATE.recordingChunks.push(e.data);
  };

  STATE.mediaRecorder.start(100);
}

function stopRecording() {
  if (!STATE.isRecording || !STATE.mediaRecorder) return;
  STATE.isRecording = false;
  clearTimeout(STATE.silenceTimer);
  STATE.silenceTimer = null;

  STATE.mediaRecorder.onstop = () => {
    const blob = new Blob(STATE.recordingChunks, { type: STATE.mediaRecorder.mimeType });
    if (blob.size > 2000) {
      processVoiceInput(blob);
    } else {
      setPhase('idle');
    }
  };

  STATE.mediaRecorder.stop();
}

function cancelRecording() {
  if (!STATE.isRecording) return;
  STATE.isRecording = false;
  clearTimeout(STATE.silenceTimer);
  STATE.silenceTimer = null;
  STATE.mediaRecorder?.stop();
  setPhase('idle');
}

// ═══════════════════════════════════════════════════════════════════════
//  STT — TRANSCRIPCIÓN CON WHISPER
// ═══════════════════════════════════════════════════════════════════════

async function transcribeAudio(blob) {
  // AIML API — /v1/stt/create con campo "audio" + polling
  const ext = blob.type.includes('webm') ? 'webm'
             : blob.type.includes('mp4')  ? 'mp4'
             : blob.type.includes('ogg')  ? 'ogg'
             : 'webm';

  const formData = new FormData();
  formData.append('audio', blob, `audio.${ext}`);
  formData.append('model', CONFIG.models.stt);

  const createRes = await fetch('https://api.aimlapi.com/v1/stt/create', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${CONFIG.aimlKey}` },
    body: formData
  });

  if (!createRes.ok) {
    const err = await createRes.text();
    console.error('[AMI] STT create error:', createRes.status, err);
    throw new Error(`STT ${createRes.status}: ${err.slice(0, 120)}`);
  }

  const { generation_id } = await createRes.json();
  if (!generation_id) throw new Error('STT: no se recibió generation_id');

  // Polling hasta tener resultado
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 1500));
    const pollRes = await fetch(`https://api.aimlapi.com/v1/stt/${generation_id}`, {
      headers: { 'Authorization': `Bearer ${CONFIG.aimlKey}` }
    });
    if (!pollRes.ok) continue;
    const pollData = await pollRes.json();
    const status = pollData.status;
    if (status === 'completed' || status === 'succeeded') {
      const transcript =
        pollData.result?.results?.channels?.[0]?.alternatives?.[0]?.transcript ||
        pollData.output?.results?.channels?.[0]?.alternatives?.[0]?.transcript ||
        pollData.result?.text || pollData.text || '';
      console.log('[AMI] Transcripción:', transcript);
      return transcript.trim();
    }
    if (status === 'failed' || status === 'error') throw new Error('STT: falló en el servidor');
  }
  throw new Error('STT: timeout esperando transcripción');
}

// ═══════════════════════════════════════════════════════════════════════
//  TTS — SÍNTESIS DE VOZ
// ═══════════════════════════════════════════════════════════════════════

let currentAudio = null;

async function speak(text) {
  if (!text || !CONFIG.aimlKey) return;

  const clean = text
    .replace(/\*\*/g, '').replace(/\*/g, '').replace(/#{1,6}\s/g, '')
    .replace(/\n+/g, ' ').trim()
    .substring(0, 4000);

  setPhase('speaking');
  STATE.isSpeaking = true;
  pauseWebSpeech();

  try {
    // ElevenLabs via AIML API — endpoint /v1/tts
    const response = await fetch('https://api.aimlapi.com/v1/tts', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${CONFIG.aimlKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: CONFIG.models.tts,
        text:  clean,
        voice: CONFIG.models.ttsVoice
      })
    });

    if (!response.ok) {
      const err = await response.text();
      console.error('[AMI] TTS error:', response.status, err);
      throw new Error(`TTS ${response.status}`);
    }

    // AIML puede devolver JSON con URL o audio binario directamente
    const contentType = response.headers.get('content-type') || '';
    let audioUrl;

    if (contentType.includes('application/json')) {
      const data = await response.json();
      audioUrl = data.audio_url || data.url || data.data?.[0]?.url;
      if (!audioUrl) throw new Error('TTS: no se recibió URL de audio');
    } else {
      // Respuesta binaria directa (mp3/ogg)
      const blob = await response.blob();
      audioUrl = URL.createObjectURL(blob);
    }

    if (currentAudio) {
      currentAudio.pause();
      if (currentAudio.src.startsWith('blob:')) URL.revokeObjectURL(currentAudio.src);
    }

    currentAudio = new Audio(audioUrl);
    currentAudio.volume = 1.0;

    const audioSim = setInterval(() => { threeAudioLevel = 0.2 + Math.random() * 0.5; }, 50);

    await new Promise((resolve, reject) => {
      currentAudio.onended = () => {
        clearInterval(audioSim);
        if (audioUrl.startsWith('blob:')) URL.revokeObjectURL(audioUrl);
        resolve();
      };
      currentAudio.onerror = (e) => {
        clearInterval(audioSim);
        console.error('[AMI] Audio playback error:', e);
        reject(e);
      };
      currentAudio.play().catch(reject);
    });

  } catch (e) {
    console.warn('[AMI] TTS falló:', e.message);
    showNotif(`TTS error: ${e.message}`, 'warning');
  } finally {
    threeAudioLevel = 0;
    STATE.isSpeaking = false;
    setPhase('idle');
    resumeWebSpeech();
  }
}

function stopSpeaking() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  STATE.isSpeaking = false;
  threeAudioLevel = 0;
}

      },

    ], CONFIG.models.chatFast, { max_tokens: 20, temperature: 0 });

    const intent = result.trim().toLowerCase().replace(/[^a-z_]/g, '');
    const valid = [
      'chat','self_info','song_id','reply_message','deep_search','time_track',

async function chatCompletion(messages, model, options = {}) {
  const response = await fetch(`${CONFIG.aimlBase}/chat/completions`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${CONFIG.aimlKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model,
      messages,
      temperature: options.temperature ?? 0.7,
      max_tokens:  options.max_tokens  ?? 600,
      stream:      false,
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`Chat API error ${response.status}: ${err}`);
  }

  const data = await response.json();
  return data.choices?.[0]?.message?.content || '';
}

async function generateImage(prompt, useFlux = false) {
  const model = useFlux ? CONFIG.models.imageGen2 : CONFIG.models.imageGen;
  const isFlux = useFlux || model.includes('flux');

  const body = isFlux
    ? { model, prompt, image_size: '1024x1024' }
    : { model, prompt, n: 1, size: '1024x1024', quality: 'standard', response_format: 'url' };

  const response = await fetch(`${CONFIG.aimlBase}/images/generations`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${CONFIG.aimlKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    // Si DALL-E falla, intentar con Flux
    if (!useFlux) return generateImage(prompt, true);
    throw new Error(`Image gen error ${response.status}`);
  }
  const data = await response.json();
  return data.data?.[0]?.url || data.images?.[0]?.url || null;
}

async function visionAnalysis(imageBase64, prompt, mimeType = 'image/jpeg') {
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    {
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: `data:${mimeType};base64,${imageBase64}` } },
        { type: 'text', text: prompt }
      ]
    }
  ];

  return chatCompletion(messages, CONFIG.models.vision, { max_tokens: 400 });

// ═══════════════════════════════════════════════════════════════════════

async function processTranscript(transcript) {
  if (!transcript) return;

  // Modo wake word: ignorar si no mencionan a Ami
  if (STATE.wakeWordOnly && !/\bami\b/i.test(transcript)) {
    setPhase('idle');
    return;
  }

  // Limpiar wake word del inicio si fue usada como activador
  const cleanTranscript = transcript.replace(/^ami[,:\s]+/i, '').trim() || transcript;

  setPhase('processing');
  showThinking(true);
  pauseWebSpeech();

  // Modo traducción simultánea activo: traducir en tiempo real sin procesamiento completo
  if (STATE.translateLiveMode) {
    const exitWords = /salir|stop|parar|desactivar|cerrar|apagar/i;
    if (exitWords.test(cleanTranscript)) {
      STATE.translateLiveMode = false;
      closePanel('translate-live');
      showNotif('Traducción simultánea desactivada', 'info');
      showThinking(false);
      setPhase('idle');
      resumeWebSpeech();
      return;
    }
    await translateLiveProcess(cleanTranscript);
    showThinking(false);
    setPhase('idle');
    resumeWebSpeech();
    return;
  }

  try {
    console.log('[AMI] Usuario:', cleanTranscript);
    showLastTranscript(cleanTranscript);

    // Determinar intención con IA (async)
    const intent = await routeIntent(cleanTranscript);
    const { model, label } = getModelForIntent(intent);
    setHudValue('hud-model', label);

    // Agregar al historial
    STATE.conversationHistory.push({ role: 'user', content: cleanTranscript });
    STATE.turnCount++;
    setHudValue('hud-turns', STATE.turnCount);

    // Abrir panel de chat
    if (!STATE.openPanels['chat']) openChatPanel();
    addChatMessage('user', cleanTranscript);

    // Manejar por intención
    let aiReply = '';
    switch (intent) {
      case 'self_info':      aiReply = await handleSelfInfo(cleanTranscript);           break;
      case 'song_id':        aiReply = await handleSongId(cleanTranscript);             break;
      case 'reply_message':  aiReply = await handleReplyMessage(cleanTranscript);       break;
      case 'deep_search':    aiReply = await handleDeepSearch(cleanTranscript);         break;
      case 'time_track':     aiReply = await handleTimeTrack();                         break;
      case 'image_gen':      aiReply = await handleImageGen(cleanTranscript);           break;
      case 'vision_camera':  aiReply = await handleVisionCamera(cleanTranscript);       break;
      case 'vision_screen':  aiReply = await handleVisionScreen(cleanTranscript);       break;
      case 'search':         aiReply = await handleSearch(cleanTranscript, model);      break;
      case 'reasoning':      aiReply = await handleReasoning(cleanTranscript);          break;
      case 'pc_control':     aiReply = await handlePcControl(cleanTranscript);          break;
      case 'profile':        aiReply = handleProfile();                                 break;
      case 'translate':      aiReply = await handleTranslate(cleanTranscript, model);   break;
      case 'translate_live': aiReply = await handleTranslateLive(cleanTranscript);      break;
      case 'system_info':    aiReply = await handleSystemInfo();                        break;
      case 'video_gen':      aiReply = await handleVideoGen(cleanTranscript);           break;
      case 'music_gen':      aiReply = await handleMusicGen(cleanTranscript);           break;
      case 'ami_control':    aiReply = await handleAmiControl(cleanTranscript);         break;
      case 'model_3d':       aiReply = await handle3DModel(cleanTranscript);            break;
      case 'holo_2d':        aiReply = await handleHolo2D(cleanTranscript);             break;
      case 'debate':         aiReply = await handleDebate(cleanTranscript);             break;
      case 'monitoreo':      aiReply = await handleMonitoreo(cleanTranscript);          break;
      case 'visual_memory':  aiReply = await handleVisualMemory(cleanTranscript);       break;
      case 'planning':       aiReply = await handlePlanning(cleanTranscript);           break;
      default:               aiReply = await handleChat(cleanTranscript);
    }

    if (!aiReply) aiReply = 'Hubo un problema procesando tu mensaje.';

    addChatMessage('ami', aiReply);
    STATE.conversationHistory.push({ role: 'assistant', content: aiReply });
    saveConvLocal();
    extractFactForAutobiography(cleanTranscript, aiReply);

    // Auto-detección de tareas en conversación casual (solo en chat general)
    if (intent === 'chat') {
      tryExtractTaskFromChat(cleanTranscript, aiReply);
    }

    showThinking(false);
    await speak(aiReply);

  } catch (e) {
    console.error('[AMI] Error procesando:', e);
    showThinking(false);
    showNotif('Error: ' + e.message, 'error');
    setPhase('idle');
    resumeWebSpeech();
  }
}

// Recibe blob de audio del VAD, transcribe con Whisper y procesa
async function processVoiceInput(audioBlob) {
  if (!audioBlob || audioBlob.size < 1500) {
    setPhase('idle');
    return;
  }

  setPhase('processing');
  showThinking(true);

  try {
    showNotif('Transcribiendo...', 'info');
    const transcript = await transcribeAudio(audioBlob);

    if (!transcript || transcript.length < 2) {
      console.log('[AMI] Transcripción vacía, ignorando.');
      setPhase('idle');
      showThinking(false);
      return;
    }

    await processTranscript(transcript);

  } catch (e) {
    console.error('[AMI] STT error:', e);
    showNotif('Error STT: ' + e.message, 'error');
    setPhase('idle');
    showThinking(false);
  }
}

async function detectMood(transcript) {
  try {
    const res = await chatCompletion([
      { role: 'system', content: 'Analizá el estado emocional de este mensaje. Respondé SOLO con una de estas palabras: triste, cansado, estresado, enojado, feliz, neutro, entusiasmado.' },
      { role: 'user', content: transcript }
    ], CONFIG.models.chatFast, { max_tokens: 10, temperature: 0.1 });
    return res.trim().toLowerCase();
  } catch(e) { return 'neutro'; }
}

async function handleChat(transcript) {

async function handleSongId(transcript) {
  showNotif('Capturando audio ambiente...', 'info');

  const hint = transcript.replace(/qué canción|qué tema|identificá|identifica|shazam|cómo se llama|que es esta canción|que cancion es|qué música suena/gi, '').trim();

  try {
    // Grabar 6 segundos de audio ambiente para detectar letra/melodía
    let lyricsHint = hint;
    const audioBlob = await captureMusicSnippet();

    if (audioBlob && audioBlob.size > 1500) {
      showNotif('Analizando audio...', 'info');
      try {
        const transcribed = await transcribeAudio(audioBlob);
        if (transcribed && transcribed.length > 3) {
          lyricsHint = transcribed;
          showNotif(`Audio detectado: "${transcribed.slice(0, 30)}..."`, 'info');
        }
      } catch(e) {
        console.warn('[AMI] STT música falló:', e.message);

    const query = lyricsHint
      ? `canción con letra o fragmento: "${lyricsHint}" ¿cuál es el título y artista exacto?`

    const { text } = await perplexitySearch(query, 'Sos un experto musical con oído absoluto. Identificá la canción y artista con la mayor precisión posible. Respondé en español rioplatense, máximo 3 oraciones. Si no encontrás, decilo directamente.');

// ─── Búsqueda web con Perplexity (queries CORTAS y directas) ────────────────
async function perplexitySearch(query, systemHint = '') {
  const response = await fetch(`${CONFIG.aimlBase}/chat/completions`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${CONFIG.aimlKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: CONFIG.models.search,
      messages: [
        {
          role: 'system',
          content: systemHint || 'Respondé en español rioplatense. Sé directo y específico. Incluí toda la información que encontrés. Si no hay datos, decilo en una línea.'
        },
        { role: 'user', content: query }
      ],
      temperature: 0.1,
      max_tokens: 900,
      stream: false,
      return_citations: true,
    })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error(`Perplexity error ${response.status}: ${err.slice(0, 200)}`);
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const citations = data.citations || [];
  return { text, citations };
}


// ─── Deep search de personas ────────────────────────────────────────────
async function handleDeepSearch(transcript) {
  const person = transcript
    .replace(/^(a|sobre|de|acerca de)\s+/i, '')
    .trim();

  if (!person || person.length < 2) {
    return 'Decime el nombre de la persona que querés investigar.';
  }

  showNotif(`🔍 Iniciando deep search: ${person}`, 'info');

  // Abrir panel con loader inmediatamente
  createPanel('deepsearch', `🔍 DEEP SEARCH: ${person.toUpperCase()}`, `
    <div id="ds-phase-label" style="font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--t);margin-bottom:10px;animation:blink 0.8s step-end infinite">INICIANDO INVESTIGACIÓN...</div>
    <div id="ds-body" style="max-height:420px;overflow-y:auto;padding-right:4px"></div>
  `, { width: 500 });

  const dsPhase = document.getElementById('ds-phase-label');
  const dsBody  = document.getElementById('ds-body');

  const setPhaseLabel = (txt) => { if (dsPhase) dsPhase.textContent = txt; };
  const appendSection = (icon, title, content) => {
    if (!dsBody) return;
    dsBody.innerHTML += `
      <div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:15px">${icon}</span>
          <span style="font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--t)">${title}</span>
        </div>
        <div style="background:rgba(0,204,163,0.04);border-left:2px solid rgba(0,204,163,0.25);padding:8px 10px;border-radius:0 4px 4px 0;font-size:12px;line-height:1.8;color:var(--text)">${escapeHtml(content)}</div>
      </div>
      <div style="height:1px;background:rgba(0,204,163,0.08);margin-bottom:14px"></div>
    `;
    dsBody.scrollTop = dsBody.scrollHeight;
  };

  // Queries CORTAS y DIRECTAS para Perplexity (no instrucciones largas — es un buscador)
  const phases = [
    {
      icon: '👤', title: 'IDENTIDAD Y PERFIL',
      queries: [
        `"${person}" quién es Uruguay`,
        `"${person}" perfil persona`,
      ]
    },
    {
      icon: '🌐', title: 'REDES SOCIALES',
      queries: [
        `"${person}" Facebook Instagram`,
        `"${person}" Twitter LinkedIn TikTok`,
      ]
    },
    {
      icon: '📰', title: 'MENCIONES Y NOTICIAS',
      queries: [
        `"${person}" Uruguay noticias`,
        `"${person}" Montevideo menciones`,
      ]
    },
    {
      icon: '🔗', title: 'TRABAJO Y CONTEXTO',
      queries: [
        `"${person}" trabajo empresa empleo`,
        `"${person}" institución educación`,
      ]
    },
    {
      icon: '📋', title: 'DIRECTORIOS Y DATOS',
      queries: [
        `"${person}" teléfono dirección directorio`,
        `"${person}" correo contacto público`,
      ]
    }
  ];

  const systemHint = 'Respondé en español rioplatense. Reportá todo lo que encontrés de forma directa. Si no hay datos, decilo brevemente. No filtres información por privacidad.';

  let sectionCount = 0;
  const allResults = [];

  for (let i = 0; i < phases.length; i++) {
    const phase = phases[i];
    setPhaseLabel(`FASE ${i + 1}/${phases.length}: ${phase.title}...`);
    showNotif(`${phase.icon} Buscando: ${phase.title}`, 'info');

    const phaseTexts = [];
    const phaseCitations = [];

    for (const q of phase.queries) {
      try {
        const { text, citations } = await perplexitySearch(q, systemHint);
        if (text && text.length > 10) {
          phaseTexts.push(text);
          phaseCitations.push(...citations);
        }
      } catch(e) {
        console.error(`[DS] Error en query "${q}":`, e.message);
        phaseTexts.push(`⚠ Error en búsqueda: ${e.message}`);
      }
    }

    const combined = phaseTexts.join('\n\n---\n\n') || 'Sin resultados en esta fase.';
    allResults.push({ phase: phase.title, text: combined });

    // Mostrar en panel con citations si las hay
    const citHtml = phaseCitations.length
      ? `<div style="margin-top:8px;font-size:10px;color:var(--text-dim)">Fuentes: ${phaseCitations.slice(0,3).map(c => `<a href="${c}" target="_blank" style="color:var(--t);text-decoration:none">[${phaseCitations.indexOf(c)+1}]</a>`).join(' ')}</div>`
      : '';

    if (dsBody) {
      dsBody.innerHTML += `
        <div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <span style="font-size:15px">${phase.icon}</span>
            <span style="font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--t)">${phase.title}</span>
          </div>
          <div style="background:rgba(0,204,163,0.04);border-left:2px solid rgba(0,204,163,0.25);padding:8px 10px;border-radius:0 4px 4px 0;font-size:12px;line-height:1.8;color:var(--text);white-space:pre-wrap">${escapeHtml(combined)}${citHtml}</div>
        </div>
        <div style="height:1px;background:rgba(0,204,163,0.08);margin-bottom:14px"></div>
      `;
      dsBody.scrollTop = dsBody.scrollHeight;
    }
    if (combined !== 'Sin resultados en esta fase.') sectionCount++;
  }

  // Síntesis final con GPT-4.1
  setPhaseLabel('SINTETIZANDO RESULTADOS...');
  let summary = '';
  try {
    const rawData = allResults.map(r => `### ${r.phase}\n${r.text}`).join('\n\n');
    summary = await chatCompletion([
      { role: 'system', content: 'Sos un analista OSINT. Resumí los hallazgos en español rioplatense. Sé concreto. Destacá los datos más relevantes que encontraste. Si hay poca info, decilo directamente.' },
      { role: 'user', content: `Datos recopilados sobre "${person}":\n\n${rawData}\n\nHacé un resumen ejecutivo de lo más importante encontrado.` }
    ], CONFIG.models.chat, { max_tokens: 400 });

    if (dsBody) {
      dsBody.innerHTML += `
        <div style="margin-top:6px;padding:10px;background:rgba(0,204,163,0.08);border:1px solid rgba(0,204,163,0.3);border-radius:6px">
          <div style="font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--t-bright);margin-bottom:8px">📊 RESUMEN EJECUTIVO</div>
          <div style="font-size:12px;line-height:1.8;color:var(--text-bright);white-space:pre-wrap">${escapeHtml(summary)}</div>
        </div>
      `;
    }
  } catch(e) {
    console.warn('[DS] Error en síntesis:', e.message);
  }

  if (dsPhase) {
    dsPhase.textContent = `✓ INVESTIGACIÓN COMPLETA — ${sectionCount}/5 FASES CON DATOS`;
    dsPhase.style.animation = 'none';
    dsPhase.style.color = 'var(--t-bright)';
  }

  if (sectionCount === 0) {
    return `Busqué en 10 queries distintas sobre ${person} y no encontré rastro público. Puede ser que la persona no tenga presencia digital, o que el nombre esté escrito diferente. Podés probar con variantes del nombre, apodo, o darme más contexto.`;
  }
  return summary || `Investigación completa sobre ${person}. Encontré datos en ${sectionCount}/5 áreas. Todo está en el panel.`;
}

// ─── Trackeo de tiempo ──────────────────────────────────────────────────
async function handleTimeTrack() {
  if (!STATE.bridgeConnected) {
    // Sin bridge, mostrar sesión actual
    const sessionMin = Math.floor((Date.now() - STATE.sessionStart) / 60000);
    return `Llevás ${sessionMin} minutos en esta sesión con Ami. Para ver qué apps usaste necesito el bridge conectado.`;
  }

  try {
    const sysResult = await sendBridgeCommand({ type: 'processes' });
    const procResult = await sendBridgeCommand({ type: 'system_info' });

    const processes = sysResult?.processes?.slice(0, 10).map(p => p.name).join(', ') || 'N/A';
    const uptime = procResult?.data?.uptime_seconds
      ? `${Math.floor(procResult.data.uptime_seconds / 3600)}h ${Math.floor((procResult.data.uptime_seconds % 3600) / 60)}min`
      : 'N/A';

    createPanel('timetrack', '⏱ ACTIVIDAD', `
      <div class="sys-row"><span class="sys-key">Uptime del sistema</span><span class="sys-value">${uptime}</span></div>
      <div class="sys-row"><span class="sys-key">Sesión con Ami</span><span class="sys-value">${Math.floor((Date.now() - STATE.sessionStart) / 60000)} min</span></div>
