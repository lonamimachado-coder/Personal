async function handleReasoning(transcript) {
  showNotif('Razonamiento profundo...', 'info');
  openReasoningPanel();

  const messages = [
    {
      role: 'system',
      content: SYSTEM_PROMPT + '\n\nEn este modo, razonás en voz alta antes de concluir. Mostrás tus pasos de razonamiento y luego dás una conclusión clara.'
    },
    ...STATE.conversationHistory.slice(-8),
    { role: 'user', content: transcript }
  ];

  try {
    const fullResponse = await chatCompletion(messages, CONFIG.models.reasoning, { max_tokens: 1200 });

    // Separar pensamiento de conclusión (algunos modelos usan <think>...</think>)
    let thinking = '', conclusion = fullResponse;
    const thinkMatch = fullResponse.match(/<think>([\s\S]*?)<\/think>/);
    if (thinkMatch) {
      thinking   = thinkMatch[1].trim();
      conclusion = fullResponse.replace(/<think>[\s\S]*?<\/think>/, '').trim();
    }

    updateReasoningPanel(thinking, conclusion);
    return conclusion || fullResponse;
  } catch (e) {
    return `No pude hacer el análisis. Error: ${e.message}`;
  }
}

async function handleVisionCamera(transcript) {
  // Capturar frame de cámara
  if (!STATE.openPanels['camera']) {
    await openCameraPanel();
    await new Promise(r => setTimeout(r, 1000)); // Esperar que la cámara se inicialice
  }

  const videoEl = document.getElementById('camera-feed');
  if (!videoEl || videoEl.readyState < 2) {
    return 'La cámara no está disponible ahora mismo.';
  }

  try {
    const canvas = document.createElement('canvas');
    canvas.width  = videoEl.videoWidth  || 640;
    canvas.height = videoEl.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(videoEl, 0, 0);
    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

    const questionPrompt = transcript.replace(/qué ves|describí|qué hay en|tomá una foto/gi, '').trim()
                           || 'Describí detalladamente lo que ves en esta imagen.';

    const result = await visionAnalysis(base64, questionPrompt);

    // Guardar en memoria visual
    saveToVisualMemory(result, 'camera', canvas.toDataURL('image/jpeg', 0.3));

    // Mostrar snapshot
    const snapshot = document.getElementById('camera-snapshot');
    if (snapshot) {
      snapshot.src     = canvas.toDataURL('image/jpeg', 0.7);
      snapshot.style.display = 'block';
    }

    return result;
  } catch (e) {
    return `No pude analizar la cámara: ${e.message}`;
  }
}

async function handlePcControl(transcript) {
  if (!STATE.bridgeConnected) {
    return 'El bridge de PC no está conectado. Ejecutá ami_bridge.py primero.';
  }

  const messages = [
    {
      role: 'system',
      content: `Sos un intérprete de comandos de PC. El usuario da una instrucción en lenguaje natural y vos respondés SOLO con un JSON válido. Sin backticks, sin explicaciones, solo el JSON.

Comandos disponibles:
{ type:"open_app", name:"chrome" }
{ type:"open_url", url:"https://..." }
{ type:"type_text", text:"..." }
{ type:"key_press", key:"enter" }
{ type:"key_hotkey", keys:["ctrl","c"] }
{ type:"mouse_click", x:100, y:200 }
{ type:"screenshot" }
{ type:"set_volume", level:50 }
{ type:"media_control", action:"play_pause" }
{ type:"processes" }

Respondé SOLO con el JSON plano. Sin \`\`\`json ni nada extra.`
    },
    { role: 'user', content: transcript }
  ];

  try {
    let jsonStr = await chatCompletion(messages, CONFIG.models.chat, { max_tokens: 150, temperature: 0.1 });
    // Limpiar posibles backticks o texto extra del modelo
    jsonStr = jsonStr.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    // Extraer solo el primer objeto JSON si hay texto extra
    const match = jsonStr.match(/\{[\s\S]*?\}/);
    if (!match) throw new Error('El modelo no devolvió un JSON válido');
    const cmd = JSON.parse(match[0]);

    const result = await sendBridgeCommand(cmd);

    if (result?.success) {
      const confirmMessages = [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: `El usuario pidió: "${transcript}". Comando ejecutado: ${JSON.stringify(cmd)}. Resultado: ${JSON.stringify(result)}. Confirmá brevemente en español rioplatense.` }
      ];
      return chatCompletion(confirmMessages, CONFIG.models.chatFast, { max_tokens: 80 });
    } else {
      return `No pude ejecutar eso: ${result?.error || 'error desconocido'}`;
    }
  } catch (e) {
    return `Error con el comando de PC: ${e.message}`;
  }
}

let panelZIndex = 100;

function createPanel(id, title, content, opts = {}) {
  const container = document.getElementById('panels-container');

  // Si ya existe, traerlo al frente
  const existing = document.getElementById(`panel-${id}`);
  if (existing) {
    existing.style.zIndex = ++panelZIndex;
    return existing;
  }

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.id = `panel-${id}`;
  panel.style.zIndex = ++panelZIndex;

  // Posición
  const pos = opts.position || getAutoPosition();
  panel.style.top  = pos.top  + 'px';
  panel.style.left = pos.left + 'px';

  if (opts.width) panel.style.width = opts.width + 'px';

  panel.innerHTML = `
    <div class="panel-scan"></div>
    <div class="panel-header" data-panel="${id}">
      <span class="panel-title">${title}</span>
      <button class="panel-close" onclick="closePanel('${id}')">✕</button>
    </div>
    <div class="panel-body" id="panel-body-${id}">
      ${content}
    </div>
  `;

  container.appendChild(panel);
  STATE.openPanels[id] = panel;

  // Hacer draggable
  makeDraggable(panel);

  // Eliminar la línea de scan después de la animación
  setTimeout(() => {
    const scan = panel.querySelector('.panel-scan');
    if (scan) scan.remove();
  }, 600);

  return panel;
}

function closePanel(id) {
  const panel = document.getElementById(`panel-${id}`);
  if (!panel) return;

  panel.classList.add('closing');
  setTimeout(() => {
    panel.remove();
    delete STATE.openPanels[id];
  }, 300);
}

function getAutoPosition() {
  const existing = Object.keys(STATE.openPanels).length;
  const col = existing % 3;
  const row = Math.floor(existing / 3);
  return {
    top:  80 + row * 60,
    left: 40 + col * (Math.min(window.innerWidth / 3, 480))
  };
}

function makeDraggable(panel) {
  const header = panel.querySelector('.panel-header');
  if (!header) return;

  const isMobile = () => window.innerWidth <= 768;

  let startX, startY, startLeft, startTop;

  header.addEventListener('mousedown', e => {
    if (e.target.classList.contains('panel-close')) return;
    if (isMobile()) return;
    startX    = e.clientX;
    startY    = e.clientY;
    startLeft = parseInt(panel.style.left) || 0;
    startTop  = parseInt(panel.style.top)  || 0;
    panel.style.zIndex = ++panelZIndex;

    const onMove = ev => {
      panel.style.left = (startLeft + ev.clientX - startX) + 'px';
      panel.style.top  = (startTop  + ev.clientY - startY) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  header.addEventListener('touchstart', e => {
    if (e.target.classList.contains('panel-close')) return;
    if (isMobile()) return;
    const t = e.touches[0];
    startX    = t.clientX; startY    = t.clientY;
    startLeft = parseInt(panel.style.left) || 0;
    startTop  = parseInt(panel.style.top)  || 0;
    panel.style.zIndex = ++panelZIndex;
    const onMove = ev => {
      const tt = ev.touches[0];
      panel.style.left = (startLeft + tt.clientX - startX) + 'px';
      panel.style.top  = (startTop  + tt.clientY - startY) + 'px';
    };
    const onEnd = () => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    };
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('touchend', onEnd);
  }, { passive: true });
}

async function handleAmiControl(transcript) {
  const t = transcript.toLowerCase();

  // Cerrar todo
  if (/cerr[aá] (todo|todos los paneles)|cerrar todo/.test(t)) {
    const ids = Object.keys(STATE.openPanels);
    ids.forEach(id => closePanel(id));
    return ids.length > 0
      ? `Cerré ${ids.length} panel${ids.length > 1 ? 'es' : ''}.`
      : 'No había paneles abiertos.';
  }

  // Galería de hologramas guardados
  if (/galerí[aá] de hologram|hologramas guardados|mis hologramas/.test(t)) {
    openHoloGallery();
    return 'Acá está tu galería de hologramas guardados.';
  }

  // Listar paneles abiertos
  if (/qu[eé] paneles (tenés|hay|están abiertos)|paneles abiertos/.test(t)) {
    const open = Object.keys(STATE.openPanels);
    if (open.length === 0) return 'No hay ningún panel abierto ahora mismo.';
    return `Tengo ${open.length} panel${open.length > 1 ? 'es' : ''} abierto${open.length > 1 ? 's' : ''}: ${open.join(', ')}.`;
  }

  // Mapa de paneles por nombre
  const panelMap = [
    { re: /chat|conversaci[oó]n|mensajes/,                        fn: () => openChatPanel(),          name: 'chat' },
    { re: /c[aá]mara/,                                            fn: () => openCameraPanel(),         name: 'cámara' },
    { re: /perfil|autobiograf/,                                   fn: () => openProfilePanel(),        name: 'perfil' },
    { re: /capacidades|ayuda|funciones|qu[eé] pod[eé]s/,          fn: () => openCapabilitiesPanel(),   name: 'capacidades' },
    { re: /sistema|cpu|ram|memoria del sistema/,                  fn: () => { if(STATE.bridgeConnected) handleSystemInfo(); else showNotif('Bridge no conectado','warning'); }, name: 'sistema' },
    { re: /b[uú]squeda|search|buscar/,                            fn: () => openSearchPanel('','',''), name: 'búsqueda' },
    { re: /razonamiento|reasoning/,                               fn: () => openReasoningPanel(),      name: 'razonamiento' },
    { re: /debate|abogado del diablo/,                            fn: () => openDebatePanel(''),       name: 'debate' },
    { re: /traducción.*vivo|traducción.*real|simultan|live.*trad|trad.*simultan/, fn: () => handleTranslateLive('en inglés'), name: 'traducción en vivo' },
    { re: /monitoreo|monitor|seguimiento de persona/,             fn: () => openMonitoreoPanel(),      name: 'monitoreo' },
    { re: /memoria.*visual|visual.*memory|lo que (vi|viste)/,     fn: () => openVisualMemoryPanel(),   name: 'memoria visual' },
    { re: /plan|tarea|agenda|pendientes|planificaci/,              fn: () => openPlanningPanel(),       name: 'planificación' },
  ];

  for (const entry of panelMap) {
    if (entry.re.test(t)) {
      entry.fn();
      return `Panel de ${entry.name} abierto.`;
    }
  }

  // Panel aleatorio
  if (/aleatorio|random|cualquier[a]?|sorprendeme|sorprendéme/.test(t)) {
    const options = [
      { name: 'chat',          fn: () => openChatPanel() },
      { name: 'capacidades',   fn: () => openCapabilitiesPanel() },
      { name: 'perfil',        fn: () => openProfilePanel() },
      { name: 'cámara',        fn: () => openCameraPanel() },
      { name: 'razonamiento',  fn: () => openReasoningPanel() },
    ];
    const pick = options[Math.floor(Math.random() * options.length)];
    pick.fn();
    return `Abrí el panel de ${pick.name}.`;
  }

  // Fallback: GPT interpreta qué panel quiere abrir
  try {
    const intent = await chatCompletion([
      { role: 'system', content: 'El usuario quiere abrir, cerrar o interactuar con un panel de la interfaz de Ami. Los paneles disponibles son: chat, camara, perfil, capacidades, sistema, busqueda, razonamiento, debate, traduccion-vivo, monitoreo, memoria-visual, aleatorio, cerrar-todo. Respondé SOLO con el nombre del panel más relevante en minúsculas, sin explicaciones. Si no matchea ninguno, respondé "chat".' },
      { role: 'user', content: transcript }
    ], CONFIG.models.chatFast, { max_tokens: 15, temperature: 0 });

    const clean = intent.trim().toLowerCase().replace(/[^a-záéíóú\-]/g, '');

    if (clean === 'cerrar-todo' || clean === 'cerrartodo') {
      const ids = Object.keys(STATE.openPanels);
      ids.forEach(id => closePanel(id));
      return `Cerré todos los paneles.`;
    }

    const fallbackMap = {
      chat:             () => openChatPanel(),
      camara:           () => openCameraPanel(),
      perfil:           () => openProfilePanel(),
      capacidades:      () => openCapabilitiesPanel(),
      sistema:          () => { if(STATE.bridgeConnected) handleSystemInfo(); },
      busqueda:         () => openSearchPanel('','',''),
      razonamiento:     () => openReasoningPanel(),
      debate:           () => openDebatePanel(''),
      traduccionvivo:   () => handleTranslateLive('en inglés'),
      monitoreo:        () => openMonitoreoPanel(),
      memoriavísual:    () => openVisualMemoryPanel(),
      memoriavisual:    () => openVisualMemoryPanel(),
      planificacion:    () => openPlanningPanel(),
      planificación:    () => openPlanningPanel(),
      tareas:           () => openPlanningPanel(),
      agenda:           () => openPlanningPanel(),
      aleatorio:        () => {
        const opts = [openChatPanel, openProfilePanel, openCapabilitiesPanel, openReasoningPanel, () => openDebatePanel(''), openMonitoreoPanel];
        opts[Math.floor(Math.random() * opts.length)]();
      },
    };

    const fn = fallbackMap[clean.replace(/-/g,'')] || fallbackMap['chat'];
    fn();
    return `Panel abierto.`;
  } catch(e) {
    openChatPanel();
    return 'Abrí el panel de chat.';
  }
}

// ═══════════════════════════════════════════════════════════════════════

async function handleTranslateLive(transcript) {
  // Si ya está activo, toggle off
  if (STATE.translateLiveMode) {
    STATE.translateLiveMode = false;
    closePanel('translate-live');
    showNotif('Traducción simultánea desactivada', 'info');
    return 'Modo traducción simultánea desactivado.';
  }

  // Detectar idioma destino
  const t = transcript.toLowerCase();
  let targetLang = 'inglés';
  if (/portugu[eé]s/.test(t))            targetLang = 'portugués';
  else if (/franc[eé]s/.test(t))         targetLang = 'francés';
  else if (/italiano/.test(t))           targetLang = 'italiano';
  else if (/alem[aá]n/.test(t))          targetLang = 'alemán';
  else if (/chino|mandar[ií]n/.test(t))  targetLang = 'chino';
  else if (/japon[eé]s/.test(t))         targetLang = 'japonés';
  else if (/español|castellano/.test(t)) targetLang = 'español';

  STATE.translateLiveMode = true;
  STATE.translateLiveTarget = targetLang;

  createPanel('translate-live', '🌍 TRADUCCIÓN SIMULTÁNEA', `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--t);animation:camDot 1s step-end infinite"></div>
      <span style="font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--t)">EN VIVO → ${targetLang.toUpperCase()}</span>
    </div>
    <div id="translate-live-feed" style="max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:8px">
      <div style="font-size:12px;color:var(--text-dim);text-align:center;padding:16px">
        Escuchando... todo lo que digas será traducido al ${targetLang}.
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text-dim);border-top:1px solid rgba(0,204,163,0.1);padding-top:8px">
      Decí "salir" o "stop" para desactivar.
    </div>
  `, { width: 440 });

  return `Modo traducción simultánea activado. Todo lo que digas lo voy a traducir al ${targetLang} en tiempo real.`;
}

async function translateLiveProcess(transcript) {
  if (!STATE.translateLiveMode) return;
  const feed = document.getElementById('translate-live-feed');
  if (!feed) return;

  try {
    const result = await chatCompletion([
      {
        role: 'system',
        content: `Sos un intérprete profesional. Traducís al ${STATE.translateLiveTarget || 'inglés'}. Respondé SOLO con la traducción, sin comentarios ni explicaciones. Mantené el tono, registro y puntuación del original.`
      },
      { role: 'user', content: transcript }
    ], CONFIG.models.chat, { max_tokens: 400, temperature: 0.1 });

    const entry = document.createElement('div');
    entry.style.cssText = 'border-bottom:1px solid rgba(0,204,163,0.08);padding:8px 0;';
    entry.innerHTML = `
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:3px;line-height:1.4">${escapeHtml(transcript)}</div>
      <div style="font-size:13px;color:var(--t-bright);font-weight:500;line-height:1.5">${escapeHtml(result)}</div>
    `;
    // Quitar placeholder inicial
    const placeholder = feed.querySelector('div[style*="text-align:center"]');
    if (placeholder) placeholder.remove();
    feed.appendChild(entry);
    feed.scrollTop = feed.scrollHeight;
  } catch(e) {}
}

//  MONITOREO DE PERSONAS
// ═══════════════════════════════════════════════════════════════════════

async function handleMonitoreo(transcript) {
  const t = transcript.toLowerCase();

  // Ver lista
  if (/lista|ver|quién|cuántos|monitoreos activos/.test(t) && !/agregar|añadir|sacar|quitar|monitorear a|seguir a/.test(t)) {
    openMonitoreoPanel();
    if (STATE.monitoredPersons.length === 0) return 'No tenés nadie en monitoreo. Decime "monitorear a [nombre]" para empezar.';
    return `Tenés ${STATE.monitoredPersons.length} persona${STATE.monitoredPersons.length > 1 ? 's' : ''} en monitoreo: ${STATE.monitoredPersons.map(p => p.name).join(', ')}.`;
  }

  // Agregar
  const addMatch = transcript.match(/monitorear a (.+)|seguir a (.+)|agregar a (.+) al? monitoreo|añadir a (.+)|empezar a seguir a (.+)/i);
  if (addMatch) {
    const name = (addMatch[1] || addMatch[2] || addMatch[3] || addMatch[4] || addMatch[5]).trim();
    if (!STATE.monitoredPersons.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      STATE.monitoredPersons.push({ name, addedAt: new Date().toISOString(), lastCheck: null, lastResult: null });
      saveMonitoredPersons();
      openMonitoreoPanel();
      return `Agregué a ${name} al monitoreo. Te aviso automáticamente si encuentro actividad nueva.`;
    }
    return `${name} ya está en la lista de monitoreo.`;
  }

  // Quitar
  const removeMatch = transcript.match(/quitar a (.+) del? monitoreo|sacar a (.+)|dejar de monitorear a (.+)|dejar de seguir a (.+)/i);
  if (removeMatch) {
    const name = (removeMatch[1] || removeMatch[2] || removeMatch[3] || removeMatch[4]).trim();
    const idx = STATE.monitoredPersons.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
    if (idx !== -1) {
      STATE.monitoredPersons.splice(idx, 1);
      saveMonitoredPersons();
      openMonitoreoPanel();
      return `Dejé de monitorear a ${name}.`;
    }
    return `${name} no estaba en tu lista.`;
  }

  openMonitoreoPanel();
  return STATE.monitoredPersons.length > 0
    ? `Tenés ${STATE.monitoredPersons.length} persona${STATE.monitoredPersons.length > 1 ? 's' : ''} en monitoreo activo.`
    : 'No hay nadie en monitoreo. Decime "monitorear a [nombre]" para empezar.';
}

function openMonitoreoPanel() {
  const list = STATE.monitoredPersons.length > 0
    ? STATE.monitoredPersons.map(p => `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(0,204,163,0.1)">
          <div style="flex:1;min-width:0">
            <div style="color:var(--t);font-size:13px;font-weight:500">${escapeHtml(p.name)}</div>
            <div style="font-size:10px;color:var(--text-dim);margin-top:2px">Desde: ${new Date(p.addedAt).toLocaleDateString('es-UY')} · Último check: ${p.lastCheck ? new Date(p.lastCheck).toLocaleTimeString('es-UY') : 'Pendiente'}</div>
            ${p.lastResult ? `<div style="font-size:11px;color:var(--text);margin-top:4px;line-height:1.5;white-space:pre-wrap">${escapeHtml(p.lastResult.slice(0,120))}...</div>` : ''}
          </div>
          <button onclick="removeMonitored('${escapeHtml(p.name)}')" style="font-size:10px;color:var(--danger);border:1px solid rgba(255,68,85,0.3);padding:3px 8px;border-radius:3px;background:none;cursor:pointer;margin-left:8px;flex-shrink:0">✕</button>
        </div>
      `).join('')
    : '<div style="text-align:center;padding:24px;color:var(--text-dim);font-size:12px">Sin personas en monitoreo.<br><br>Decí:<br>"monitorear a [nombre]"</div>';

  const existing = document.getElementById('panel-monitoreo');
  if (existing) {
    const body = document.getElementById('panel-body-monitoreo');
    if (body) body.innerHTML = `<div style="max-height:380px;overflow-y:auto">${list}</div>`;
    return;
  }
  createPanel('monitoreo', '👁 MONITOREO DE PERSONAS', `<div style="max-height:380px;overflow-y:auto">${list}</div>`, { width: 400 });
}

function removeMonitored(name) {
  STATE.monitoredPersons = STATE.monitoredPersons.filter(p => p.name !== name);
  saveMonitoredPersons();
  openMonitoreoPanel();
  showNotif(`Dejé de monitorear a ${name}`, 'info');
}

function saveMonitoredPersons() {
  try { localStorage.setItem('ami_monitored_persons', JSON.stringify(STATE.monitoredPersons)); } catch(e) {}
  if (STATE.db) {
    STATE.db.collection('ami_memory').doc('imanol').set({ monitoredPersons: STATE.monitoredPersons }, { merge: true }).catch(() => {});
  }
}

async function startPersonMonitoring() {
  // Cargar lista persistida
  try {
    const saved = localStorage.getItem('ami_monitored_persons');
    if (saved) STATE.monitoredPersons = JSON.parse(saved);
  } catch(e) {}
  if (STATE.db) {
    try {
      const doc = await STATE.db.collection('ami_memory').doc('imanol').get();
      if (doc.exists && doc.data().monitoredPersons) STATE.monitoredPersons = doc.data().monitoredPersons;
    } catch(e) {}
  }

  // Loop de monitoreo cada 20 minutos
  setInterval(async () => {
    if (STATE.monitoredPersons.length === 0 || STATE.phase !== 'idle') return;
    for (const person of STATE.monitoredPersons) {
      const lastCheck = person.lastCheck ? new Date(person.lastCheck) : null;
      if (lastCheck && (Date.now() - lastCheck) < 20 * 60 * 1000) continue;
      try {
        const { text } = await perplexitySearch(`"${person.name}" noticias recientes actividad pública`);
        const prevResult = person.lastResult || '';
        if (text && text.length > 20) {
          const isNew = await chatCompletion([
            { role: 'system', content: 'Respondé SOLO "sí" o "no".' },
            { role: 'user', content: `¿Hay información NUEVA sobre "${person.name}" respecto a esto?\nAnterior: ${prevResult.slice(0,150)}\nActual: ${text.slice(0,150)}` }
          ], CONFIG.models.chatFast, { max_tokens: 5, temperature: 0 });

          if (/s[ií]/i.test(isNew)) {
            person.lastResult = text;
            person.lastCheck = new Date().toISOString();
            saveMonitoredPersons();
            showNotif(`🔔 Actividad nueva: ${person.name}`, 'info');
            if (!STATE.openPanels['chat']) openChatPanel();
            addChatMessage('ami', `Ima, encontré actividad nueva sobre ${person.name}: ${text.slice(0, 200)}...`);
            if (!STATE.isSpeaking) speak(`Hay actividad nueva sobre ${person.name}. Lo agregué al chat.`);
          } else {
            person.lastCheck = new Date().toISOString();
          }
        }
      } catch(e) {}
      await new Promise(r => setTimeout(r, 5000));
    }
  }, 20 * 60 * 1000);
}

// ═══════════════════════════════════════════════════════════════════════

async function startCameraBackground() {
  if (STATE.cameraAutoActive) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 320, height: 240 } });
    STATE.cameraStream = stream;
    STATE.cameraAutoActive = true;
    console.log('[AMI] Cámara activa en segundo plano.');
    // Captura periódica cada 5 minutos para memoria visual
    setInterval(() => {
      if (!STATE.cameraStream || STATE.isSpeaking || STATE.phase !== 'idle') return;
      captureAndDescribeBackground();
    }, 5 * 60 * 1000);
  } catch(e) {
    console.warn('[AMI] Cámara background no disponible:', e.message);
  }
}

async function captureAndDescribeBackground() {
  if (!STATE.cameraStream) return;
  try {
    const video = document.createElement('video');
    video.srcObject = STATE.cameraStream;
    video.muted = true;
    await video.play();
    await new Promise(r => setTimeout(r, 600));
    const canvas = document.createElement('canvas');
    canvas.width = 320; canvas.height = 240;
    canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
    video.pause(); video.srcObject = null;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
    const base64 = dataUrl.split(',')[1];
    const desc = await visionAnalysis(base64, 'Describí en 1 oración breve qué ves: el entorno, si hay una persona y qué está haciendo.');
    if (desc && desc.length > 5) saveToVisualMemory(desc, 'camera', dataUrl);
  } catch(e) {}
}

//  CAPTURA DE AUDIO PARA IDENTIFICACIÓN DE CANCIONES
// ═══════════════════════════════════════════════════════════════════════

async function captureMusicSnippet() {
  return new Promise((resolve) => {
    if (!STATE.mediaStream) { resolve(null); return; }
    const chunks = [];
    let recorder;
    try {
      recorder = new MediaRecorder(STATE.mediaStream, { mimeType: 'audio/webm;codecs=opus' });
    } catch {
      try { recorder = new MediaRecorder(STATE.mediaStream); } catch(e) { resolve(null); return; }
    }
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: recorder.mimeType });
      resolve(blob.size > 1000 ? blob : null);
    };
    recorder.start(100);
    showNotif('Grabando audio (6s)...', 'info');
    setTimeout(() => { try { recorder.stop(); } catch(e) {} }, 6000);
  });
}

//  LECTOR PROACTIVO DE PANTALLA
// ═══════════════════════════════════════════════════════════════════════

function startProactiveScreenReader() {
  setInterval(async () => {
    if (!STATE.bridgeConnected || STATE.isSpeaking || STATE.phase !== 'idle') return;
    if (Math.random() > 0.15) return; // Solo ~15% de las veces, no ser molesta
    try {
      const result = await sendBridgeCommand({ type: 'screenshot', quality: 35 });
      if (!result?.success || !result?.data) return;
      // Ignorar si la pantalla no cambió
      if (STATE.lastScreenCapture && result.data.slice(0, 80) === STATE.lastScreenCapture.slice(0, 80)) return;
      STATE.lastScreenCapture = result.data;
      const analysis = await visionAnalysis(result.data, 'Analizá esta pantalla. ¿Hay algo urgente, un error, o algo relevante que debería mencionar al usuario? Si es algo rutinario/genérico, respondé exactamente: "nada". Si hay algo interesante, describilo en 1 oración breve.');
      if (!analysis || analysis.toLowerCase().trim() === 'nada') return;
      saveToVisualMemory(analysis, 'screen');
      const now = Date.now();
      if (now - STATE.lastProactiveAlert > 3 * 60 * 1000) {
        STATE.lastProactiveAlert = now;
        if (!STATE.openPanels['chat']) openChatPanel();
        addChatMessage('ami', `Notté algo en tu pantalla: ${analysis}`);
        speak(analysis);
      }
    } catch(e) {}
  }, 2 * 60 * 1000);
}

// ═══════════════════════════════════════════════════════════════════════
//  GENERACIÓN DE MODELOS 3D — TRIPOSR
// ═══════════════════════════════════════════════════════════════════════

async function handle3DModel(transcript) {
  const prompt = transcript
    .replace(/gen[ea]r[aá]|cre[aá]|un modelo 3d de?|modelo tridimensional de?|3d de?|objeto 3d de?/gi, '')
    .trim();

  if (!prompt) return 'Decime qué objeto 3D querés que genere.';

  showNotif('Generando modelo 3D con TripoSR...', 'info');

  try {
    // AIML API v2 endpoint para TripoSR
    const response = await fetch(`${CONFIG.aimlBase.replace('/v1','')}/v2/generate/3d/tripo3d/triposr/generation`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${CONFIG.aimlKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ model: CONFIG.models.model3d, prompt, output_format: 'glb' })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`3D API error ${response.status}: ${errText.slice(0,100)}`);
    }

    const data = await response.json();
    const genId = data.id || data.generation_id;

    if (!genId) {
      // Respuesta directa sin polling
      const url = data.output?.url || data.url || data.model_url;
      if (url) { open3DPanel(url, prompt); return `Modelo 3D de "${prompt}" listo.`; }
      throw new Error('No se recibió ID ni URL del modelo');
    }

    showNotif('Procesando modelo 3D...', 'info');
    for (let i = 0; i < 24; i++) {
      await new Promise(r => setTimeout(r, 5000));
      const poll = await fetch(`${CONFIG.aimlBase.replace('/v1','')}/v2/generate/3d/tripo3d/triposr/generation/${genId}`, {
        headers: { 'Authorization': `Bearer ${CONFIG.aimlKey}` }
      });
      if (!poll.ok) continue;
      const pd = await poll.json();
      if ((pd.status === 'completed' || pd.status === 'succeeded') && (pd.output?.url || pd.model_url)) {
        const url = pd.output?.url || pd.model_url;
        open3DPanel(url, prompt);
        return `Modelo 3D de "${prompt}" generado. Podés rotarlo en el panel.`;
      }
      if (pd.status === 'failed') throw new Error('Generación de 3D fallida en el servidor');
    }

async function saveHologram(imageUrl, prompt) {
  const entry = { url: imageUrl, prompt, ts: new Date().toISOString() };
  // Guardar en STATE
  if (!STATE.savedHolograms) STATE.savedHolograms = [];
  STATE.savedHolograms.push(entry);

  // Firebase
  if (STATE.db) {
    try {
      const doc = await STATE.db.collection('ami_memory').doc('imanol').get();
      const existing = doc.exists ? (doc.data().saved_holograms || []) : [];
      const updated = [...existing.slice(-19), entry]; // máx 20
      await STATE.db.collection('ami_memory').doc('imanol').set(
        { saved_holograms: updated }, { merge: true }
      );
    } catch(e) { console.warn('[AMI] Error guardando holograma Firebase:', e); }
  }
  // localStorage backup
  try {
    const local = JSON.parse(localStorage.getItem('ami_holograms') || '[]');
    local.push(entry);
    localStorage.setItem('ami_holograms', JSON.stringify(local.slice(-20)));
  } catch(e) {}
}

// ─── Helpers ──────────────────────────────────────────────────────────

function genTaskId() {
  return 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

function parsePriority(text) {
  const t = text.toLowerCase();
  if (/urgente|alta|prioridad alta|importante|críti/.test(t)) return 'alta';
  if (/media|normal/.test(t)) return 'media';
  if (/baja|cuando pueda|sin apuro/.test(t)) return 'baja';
  return 'media';
}

function parseCategory(text) {
  const t = text.toLowerCase();
  if (/roblox|juego|script|lua/.test(t)) return '🎮 Roblox';
  if (/código|programar|dev|html|proyecto/.test(t)) return '💻 Dev';
  if (/youtube|video|canal|lonami/.test(t)) return '🎬 YouTube';
  if (/estudi|tarea|escuela|liceo/.test(t)) return '📚 Estudio';
  if (/música|canción|beat/.test(t)) return '🎵 Música';
  if (/comprar|pagar|dinero|plata/.test(t)) return '💰 Finanzas';
  return '📋 General';
}

function parseDueDate(text) {
  const t = text.toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);
  if (/hoy/.test(t)) return today.toISOString().slice(0,10);
  if (/mañana/.test(t)) {
    const tom = new Date(today); tom.setDate(tom.getDate() + 1);
    return tom.toISOString().slice(0,10);
  }
  if (/esta semana|en la semana/.test(t)) {
    const end = new Date(today); end.setDate(end.getDate() + 7);
    return end.toISOString().slice(0,10);
  }
  // Día de la semana
  const dias = { lunes:1, martes:2, miércoles:3, miercoles:3, jueves:4, viernes:5, sábado:6, sabado:6, domingo:0 };
  for (const [dia, dow] of Object.entries(dias)) {
    if (t.includes(dia)) {
      const next = new Date(today);
      const diff = (dow - today.getDay() + 7) % 7 || 7;
      next.setDate(next.getDate() + diff);
      return next.toISOString().slice(0,10);
    }
  }
  return null;
}

function formatDueDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0)  return `<span style="color:var(--danger)">Vencida (${Math.abs(diff)}d)</span>`;
  if (diff === 0) return `<span style="color:var(--warn)">Hoy</span>`;
  if (diff === 1) return `<span style="color:var(--warn)">Mañana</span>`;
  if (diff <= 7)  return `<span style="color:var(--t)">En ${diff} días</span>`;
  return d.toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit' });
}

function getTasksForToday() {
  const today = new Date().toISOString().slice(0,10);
  return STATE.tasks.filter(t => !t.done && (t.dueDate === today || !t.dueDate));
}

function getTasksForWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const week  = new Date(today); week.setDate(week.getDate() + 7);
  return STATE.tasks.filter(t => {
    if (t.done) return false;
    if (!t.dueDate) return true;
    const d = new Date(t.dueDate + 'T00:00:00');
    return d >= today && d <= week;
  });
}

// ─── Handler principal ────────────────────────────────────────────────

async function handlePlanning(transcript) {
  const t = transcript.toLowerCase();

  // ── Agregar tarea ──────────────────────────────────────────────────
  const addPatterns = [
    /agreg[aá]\s+(?:una?\s+)?tarea[:\s]+(.+)/i,
    /agreg[aá]\s+(?:a\s+)?la\s+lista[:\s]+(.+)/i,
    /tengo\s+que\s+(.+)/i,
    /no\s+me\s+olvid[eé]s?\s+(?:de\s+)?(.+)/i,
    /anot[aá]\s+(?:que\s+)?(.+)/i,
    /recordame\s+(?:que\s+)?(.+)/i,
    /nueva\s+tarea[:\s]+(.+)/i,
    /pone\s+(.+)\s+en\s+(?:la\s+)?lista/i,
    /agend[aá]\s+(.+)/i,
  ];

  for (const pat of addPatterns) {
    const m = transcript.match(pat);
    if (m) {
      const rawText = m[1].trim();
      // Limpiar extras del texto de la tarea
      const cleanText = rawText
        .replace(/\s+con\s+prioridad\s+(alta|media|baja)/i, '')
        .replace(/\s+para\s+(hoy|mañana|esta\s+semana|el\s+\w+)/i, '')
        .replace(/\s+urgente/i, '')
        .trim();

      const priority = parsePriority(rawText);
      const dueDate  = parseDueDate(rawText);
      const category = parseCategory(cleanText);

      const task = {
        id:        genTaskId(),
        text:      cleanText,
        done:      false,
        priority,
        dueDate,
        category,
        createdAt: new Date().toISOString(),
      };

      STATE.tasks.push(task);
      await saveTasks();
      openPlanningPanel();

      const duePart = dueDate ? ` para ${dueDate === new Date().toISOString().slice(0,10) ? 'hoy' : 'el ' + new Date(dueDate + 'T00:00:00').toLocaleDateString('es-UY')}` : '';
      const prioPart = priority !== 'media' ? ` — prioridad ${priority}` : '';
      return `Tarea agregada: "${cleanText}"${duePart}${prioPart}.`;
    }
  }

  // ── Completar tarea ────────────────────────────────────────────────
  const donePatterns = [
    /complet[eéé]\s+(?:la\s+tarea\s+)?(.+)/i,
    /ya\s+(?:hice|terminé|hiz[oi])\s+(?:lo\s+de\s+)?(.+)/i,
    /listo\s+(?:lo\s+de\s+)?(.+)/i,
    /tach[aá]\s+(?:la\s+tarea\s+)?(.+)/i,
    /mark[aá]\s+(?:como\s+hecha?\s+)?(.+)/i,
  ];

  for (const pat of donePatterns) {
    const m = transcript.match(pat);
    if (m) {
      const query = m[1].trim().toLowerCase();
      // Buscar la tarea más similar
      const task = STATE.tasks.find(t =>
        !t.done && t.text.toLowerCase().includes(query.slice(0, 20))
      ) || STATE.tasks.find(t =>
        !t.done && query.split(' ').some(w => w.length > 3 && t.text.toLowerCase().includes(w))
      );

      if (task) {
        task.done = true;
        task.completedAt = new Date().toISOString();
        await saveTasks();
        openPlanningPanel();
        const pending = STATE.tasks.filter(t => !t.done).length;
        const msg = `Tarea completada: "${task.text}". ${pending > 0 ? `Todavía tenés ${pending} pendiente${pending > 1 ? 's' : ''}.` : '¡Todo listo por ahora!'}`;
        return msg;
      }
      return `No encontré una tarea que coincida con "${query}". Podés ver todas tus tareas en el panel.`;
    }
  }

  // ── Eliminar tarea ─────────────────────────────────────────────────
  const delPatterns = [
    /elimin[aá]\s+(?:la\s+tarea\s+)?(.+)/i,
    /borrá\s+(?:la\s+tarea\s+)?(.+)/i,
    /quitá\s+(?:la\s+tarea\s+)?(.+)/i,
    /sacá\s+(?:la\s+tarea\s+)?(.+)/i,
  ];
  for (const pat of delPatterns) {
    const m = transcript.match(pat);
    if (m) {
      const query = m[1].trim().toLowerCase();
      const idx = STATE.tasks.findIndex(t =>
        t.text.toLowerCase().includes(query.slice(0, 20))
      );
      if (idx !== -1) {
        const removed = STATE.tasks.splice(idx, 1)[0];
        await saveTasks();
        openPlanningPanel();
        return `Tarea "${removed.text}" eliminada.`;
      }
      return `No encontré esa tarea.`;
    }
  }

  // ── Limpiar completadas ────────────────────────────────────────────
  if (/limpi[aá]|borr[aá]\s+(las\s+)?completadas|limpiar\s+historial/.test(t)) {
    const count = STATE.tasks.filter(t => t.done).length;
    STATE.tasks = STATE.tasks.filter(t => !t.done);
    await saveTasks();
    openPlanningPanel();
    return count > 0
      ? `Limpié ${count} tarea${count > 1 ? 's' : ''} completada${count > 1 ? 's' : ''}.`
      : 'No había tareas completadas para limpiar.';
  }

  // ── Plan del día ───────────────────────────────────────────────────
  if (/plan (del|de hoy|de este día)|plan diario|qué tengo hoy|plan para hoy|briefing/.test(t)) {
    const todayTasks = getTasksForToday();
    const overdue = STATE.tasks.filter(t => {
      if (t.done || !t.dueDate) return false;
      return new Date(t.dueDate + 'T00:00:00') < new Date(new Date().toISOString().slice(0,10) + 'T00:00:00');
    });
    openPlanningPanel('hoy');

    if (todayTasks.length === 0 && overdue.length === 0) {
      return 'No tenés tareas pendientes para hoy. Buen momento para planificar o descansar.';
    }

    let msg = '';
    if (overdue.length > 0) msg += `Ojo: tenés ${overdue.length} tarea${overdue.length > 1 ? 's' : ''} vencida${overdue.length > 1 ? 's' : ''}. `;
    if (todayTasks.length > 0) {
      const altas = todayTasks.filter(t => t.priority === 'alta');
      msg += `Para hoy: ${todayTasks.length} tarea${todayTasks.length > 1 ? 's' : ''}`;
      if (altas.length > 0) msg += `, ${altas.length} de alta prioridad`;
      msg += '. Todo está en el panel.';
    }
    return msg;
  }

  // ── Ver tareas de la semana ────────────────────────────────────────
  if (/esta semana|semana|próximos \d+ días/.test(t)) {
    const weekTasks = getTasksForWeek();
    openPlanningPanel('semana');
    if (weekTasks.length === 0) return 'No tenés tareas para esta semana. ¡Bien!';
    const altas = weekTasks.filter(t => t.priority === 'alta').length;
    return `Esta semana tenés ${weekTasks.length} tarea${weekTasks.length > 1 ? 's' : ''} pendiente${weekTasks.length > 1 ? 's' : ''}${altas > 0 ? `, ${altas} de alta prioridad` : ''}. Las ves en el panel.`;
  }

  // ── Ver todas las pendientes ───────────────────────────────────────
  if (/pendientes|qu[eé] (me|tengo que) hacer|mis tareas|lista de tareas|mostráme|mostrá/.test(t)) {
    const pending = STATE.tasks.filter(t => !t.done);
    openPlanningPanel('pendientes');
    if (pending.length === 0) return '¡Todo completado! No tenés tareas pendientes por ahora.';
    const altas = pending.filter(t => t.priority === 'alta');
    return `Tenés ${pending.length} tarea${pending.length > 1 ? 's' : ''} pendiente${pending.length > 1 ? 's' : ''}${altas.length > 0 ? `, ${altas.length} de alta prioridad` : ''}. Todo está en el panel.`;
  }

  // ── Resumen con IA ────────────────────────────────────────────────
  openPlanningPanel();
  const pending = STATE.tasks.filter(t => !t.done);
  const completed = STATE.tasks.filter(t => t.done).length;

  if (pending.length === 0 && completed === 0) {
    return 'Todavía no tenés tareas cargadas. Podés decirme cosas como: "tengo que revisar el script de Roblox", "agregá tarea nueva: hacer el menú del shop", o "no me olvides de subir el video".';
  }

  // Usar IA para dar un resumen inteligente
  const taskList = pending.slice(0, 10).map((t, i) =>
    `${i+1}. [${t.priority.toUpperCase()}] ${t.text}${t.dueDate ? ` — para ${t.dueDate}` : ''}`
  ).join('\n');

  try {
    return await chatCompletion([
      { role: 'system', content: buildSystemPrompt('Respondé en máximo 3 oraciones sobre el estado de las tareas del usuario. Destacá lo más urgente si hay algo. Sé directo, sin formalidades.') },
      { role: 'user', content: `Estado actual de mis tareas:\nPendientes: ${pending.length}\nCompletadas hoy: ${completed}\n\nTareas pendientes:\n${taskList}\n\nEl usuario dijo: "${transcript}"` }
    ], CONFIG.models.chat, { max_tokens: 150 });
  } catch(e) {
    return pending.length > 0
      ? `Tenés ${pending.length} tarea${pending.length > 1 ? 's' : ''} pendiente${pending.length > 1 ? 's' : ''}. Las ves en el panel.`
      : '¡Todo completado! No tenés tareas pendientes.';
  }
}

// ─── Panel visual de planificación ───────────────────────────────────

function openPlanningPanel(initialFilter = 'pendientes') {
  // Si ya existe, solo refrescar
  const existing = document.getElementById('panel-planning');
  if (existing) {
    renderPlanningPanel(initialFilter);
    return;
  }

  createPanel('planning', '◈ PLANIFICACIÓN', `
    <div id="planning-inner"></div>
  `, { position: { top: 80, left: window.innerWidth - 500 }, width: 460 });

  renderPlanningPanel(initialFilter);
}

window._planFilter = 'pendientes';

function renderPlanningPanel(filter) {
  const inner = document.getElementById('planning-inner');
  if (!inner) return;

  window._planFilter = filter || window._planFilter || 'pendientes';
  const f = window._planFilter;

  const allTasks   = STATE.tasks;
  const today      = new Date().toISOString().slice(0,10);
  const weekEnd    = (() => { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0,10); })();
  const total      = allTasks.filter(t => !t.done).length;
  const doneCount  = allTasks.filter(t => t.done).length;
  const totalAll   = allTasks.length;
  const progress   = totalAll > 0 ? Math.round((doneCount / totalAll) * 100) : 0;

  let filtered;
  switch (f) {
    case 'hoy':
      filtered = allTasks.filter(t => !t.done && (t.dueDate === today || !t.dueDate));
      break;
    case 'semana':
      filtered = allTasks.filter(t => !t.done && (!t.dueDate || (t.dueDate >= today && t.dueDate <= weekEnd)));
      break;
    case 'alta':
      filtered = allTasks.filter(t => !t.done && t.priority === 'alta');
      break;
    case 'todas':
      filtered = allTasks;
      break;
    case 'pendientes':
    default:
      filtered = allTasks.filter(t => !t.done);
      break;
  }

  // Ordenar: alta prioridad primero, luego por fecha
  filtered.sort((a, b) => {
    const pOrder = { alta: 0, media: 1, baja: 2 };
    const pDiff = (pOrder[a.priority] || 1) - (pOrder[b.priority] || 1);
    if (pDiff !== 0) return pDiff;
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return 0;
  });

  // Filtros
  const filters = [
    { id: 'pendientes', label: `TODO (${total})` },
    { id: 'hoy',        label: 'HOY' },
    { id: 'semana',     label: 'SEMANA' },
    { id: 'alta',       label: '🔴 ALTA' },
    { id: 'todas',      label: 'TODAS' },
  ];
  const filterHtml = filters.map(fi => `
    <button class="plan-filter-btn${f === fi.id ? ' active' : ''}"
      onclick="window._planFilter='${fi.id}'; renderPlanningPanel('${fi.id}')">${fi.label}</button>
  `).join('');

  // Progress
  const progressHtml = totalAll > 0 ? `
    <div class="plan-progress-wrap">
      <div class="plan-progress-label">
        <span>PROGRESO GENERAL</span>
        <span style="color:var(--t)">${doneCount}/${totalAll} completadas</span>
      </div>
      <div class="plan-progress-bar">
        <div class="plan-progress-fill" style="width:${progress}%"></div>
      </div>
    </div>
  ` : '';

  // Tareas
  let tasksHtml = '';
  if (filtered.length === 0) {
    tasksHtml = `<div class="plan-empty">
      Sin tareas en esta vista.<br>
      <span>Decile a Ami: "tengo que [tarea]"<br>o escribí abajo ↓</span>
    </div>`;
  } else {
    tasksHtml = filtered.map(task => `
      <div class="plan-task ${task.done ? 'done' : ''}" id="planrow-${task.id}">
        <button class="plan-checkbox" onclick="toggleTask('${task.id}')" title="${task.done ? 'Marcar pendiente' : 'Completar'}"></button>
        <div class="plan-task-body">
          <div class="plan-task-text">${escapeHtml(task.text)}</div>
          <div class="plan-task-meta">
            <span class="plan-priority ${task.priority}">${task.priority.toUpperCase()}</span>
            ${task.category ? `<span class="plan-task-cat">${task.category}</span>` : ''}
            ${task.dueDate ? `<span class="plan-task-date">${formatDueDate(task.dueDate)}</span>` : ''}
          </div>
        </div>
        <button class="plan-delete-btn" onclick="deleteTask('${task.id}')" title="Eliminar">✕</button>
      </div>
    `).join('');
  }

  inner.innerHTML = `
    <div class="plan-filters">${filterHtml}</div>
    ${progressHtml}
    <div id="plan-list" style="max-height:320px;overflow-y:auto;padding-right:2px">${tasksHtml}</div>
    <div class="plan-add-row">
      <input class="plan-add-input" id="plan-new-input" type="text"
        placeholder="Nueva tarea... (usa #alta #media #baja, fecha: hoy/mañana)"
        onkeydown="if(event.key==='Enter') addTaskFromPanel()" />
      <button class="plan-add-btn" onclick="addTaskFromPanel()">+ AGREGAR</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end">
      ${doneCount > 0 ? `<button onclick="clearDoneTasks()" style="font-size:10px;color:var(--text-dim);border:none;background:none;cursor:pointer;font-family:var(--font-hud);letter-spacing:1px">LIMPIAR COMPLETADAS (${doneCount})</button>` : ''}
    </div>
  `;

  // Scroll al tope de la lista
  const list = document.getElementById('plan-list');
  if (list) list.scrollTop = 0;
}

window.toggleTask = async function(id) {
  const task = STATE.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  if (task.done) task.completedAt = new Date().toISOString();
  else delete task.completedAt;
  await saveTasks();
  renderPlanningPanel();
  // Feedback visual
  if (task.done) {
    const pending = STATE.tasks.filter(t => !t.done).length;
    showNotif(pending === 0 ? '¡Todo completado! 🎉' : `"${task.text.slice(0,30)}..." completada`, 'info');
  }
};

window.deleteTask = async function(id) {
  const idx = STATE.tasks.findIndex(t => t.id === id);
  if (idx === -1) return;
  const removed = STATE.tasks.splice(idx, 1)[0];
  await saveTasks();
  renderPlanningPanel();
  showNotif(`Tarea "${removed.text.slice(0,30)}..." eliminada`, 'info');
};

window.addTaskFromPanel = async function() {
  const input = document.getElementById('plan-new-input');
  if (!input || !input.value.trim()) return;
  const raw = input.value.trim();

  // Detectar prioridad con hashtag
  let priority = 'media';
  if (/#alta|#urgente/i.test(raw))  priority = 'alta';
  if (/#baja|#sin.apuro/i.test(raw)) priority = 'baja';
  if (/#media/i.test(raw))          priority = 'media';

  const cleanText = raw.replace(/#(alta|media|baja|urgente|sin.apuro)/gi, '').trim();
  const dueDate   = parseDueDate(cleanText + ' ' + raw);
  const category  = parseCategory(cleanText);
  const finalText = cleanText.replace(/\s+para\s+(hoy|mañana|esta\s+semana|el\s+\w+)/i, '').trim();

  const task = {
    id: genTaskId(), text: finalText, done: false,
    priority, dueDate, category, createdAt: new Date().toISOString()
  };
  STATE.tasks.push(task);
  await saveTasks();
  input.value = '';
  renderPlanningPanel();
  showNotif(`Tarea agregada: "${finalText.slice(0,40)}"`, 'info');
};

window.clearDoneTasks = async function() {
  const count = STATE.tasks.filter(t => t.done).length;
  if (count === 0) return;
  STATE.tasks = STATE.tasks.filter(t => !t.done);
  await saveTasks();
  renderPlanningPanel();
  showNotif(`${count} tarea${count > 1 ? 's' : ''} completada${count > 1 ? 's' : ''} eliminada${count > 1 ? 's' : ''}`, 'info');
};

// ═══════════════════════════════════════════════════════════════════════
//  BRIDGE WEBSOCKET — CONEXIÓN CON PYTHON
// ═══════════════════════════════════════════════════════════════════════

let bridgeReconnectTimer  = null;
let bridgeReconnectDelay  = 3000;   // backoff: 3s → 6s → 12s → máx 30s

function connectBridge() {
  // En GitHub Pages (HTTPS) los WebSocket ws:// están bloqueados — no intentar
  if (location.protocol === 'https:' && !CONFIG.bridgeWsUrl.startsWith('wss:')) {
    setHudValue('hud-bridge', 'N/A');
    return;
  }

  // No crear una conexión nueva si ya hay una en curso o abierta
  const s = STATE.bridgeWs?.readyState;
  if (s === WebSocket.OPEN || s === WebSocket.CONNECTING) return;

  try {
    STATE.bridgeWs = new WebSocket(CONFIG.bridgeWsUrl);

    STATE.bridgeWs.onopen = () => {
      STATE.bridgeConnected = true;
      bridgeReconnectDelay  = 3000;   // resetear backoff
      setHudValue('hud-bridge', 'CONECTADO');
      console.log('[AMI] Bridge conectado.');
      clearTimeout(bridgeReconnectTimer);

      // Actualizar info del sistema periódicamente
      setInterval(updateSystemHud, 30000);
      updateSystemHud();
    };

    STATE.bridgeWs.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        handleBridgeMessage(data);
      } catch (e) {}
    };

    STATE.bridgeWs.onclose = () => {
      STATE.bridgeConnected = false;
      setHudValue('hud-bridge', 'DESCONECTADO');
      bridgeReconnectDelay = Math.min(bridgeReconnectDelay * 2, 30000);
      bridgeReconnectTimer = setTimeout(connectBridge, bridgeReconnectDelay);
    };

    STATE.bridgeWs.onerror = () => {
      STATE.bridgeConnected = false;
    };

  } catch (e) {
    STATE.bridgeConnected = false;
    bridgeReconnectTimer = setTimeout(connectBridge, 5000);
  }
}

function handleBridgeMessage(data) {
  // Respuesta a request pendiente
  if (data.id && STATE.pendingBridgeRequests[data.id]) {
    STATE.pendingBridgeRequests[data.id](data);
    delete STATE.pendingBridgeRequests[data.id];
    return;
  }

  // Alertas proactivas del bridge
  if (data.type === 'proactive_alerts' && data.alerts?.length > 0) {
    data.alerts.forEach(alert => {
      showNotif(alert.message, alert.severity === 'critical' ? 'error' : 'warning');
    });
  }
}

function sendBridgeCommand(cmd) {
  return new Promise((resolve, reject) => {
    if (!STATE.bridgeConnected || !STATE.bridgeWs) {
      reject(new Error('Bridge no conectado'));
      return;
    }

    const id = Date.now() + '-' + Math.random().toString(36).slice(2);
    cmd.id = id;

    const timeout = setTimeout(() => {
      delete STATE.pendingBridgeRequests[id];
      reject(new Error('Bridge timeout'));
    }, 8000);

    STATE.pendingBridgeRequests[id] = (response) => {
      clearTimeout(timeout);
      resolve(response);
    };

    STATE.bridgeWs.send(JSON.stringify(cmd));
  });
}

async function updateSystemHud() {
  if (!STATE.bridgeConnected) return;
  try {
    const result = await sendBridgeCommand({ type: 'system_info' });
    if (result?.success && result.data) {
      const d = result.data;
      setHudValue('hud-cpu', (d.cpu_percent?.toFixed(0) || '—') + '%');
      setHudValue('hud-mem', (d.memory_percent?.toFixed(0) || '—') + '%');
    }
  } catch (e) {}
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ═══════════════════════════════════════════════════════════════════════
//  TIME TRACKER — Rastrea tiempo de uso automáticamente
// ═══════════════════════════════════════════════════════════════════════

const TIME_TRACKER = {
  sessionStart: null,   // cuando la app estuvo en foco
  sessions: [],         // [{start, end, duration, date}]
  todayKey: null,
};

function startTimeTracking() {
  const todayKey = new Date().toLocaleDateString('es-UY');
  TIME_TRACKER.todayKey = todayKey;

  // Cargar sesiones guardadas
  try {
    const saved = JSON.parse(localStorage.getItem('ami_time_sessions') || '{}');
    TIME_TRACKER.sessions = saved[todayKey] || [];
  } catch(e) {}

  // Comenzar sesión actual
  TIME_TRACKER.sessionStart = Date.now();

  // Detectar visibilidad de la página
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      // App perdió foco — cerrar sesión
      if (TIME_TRACKER.sessionStart) {
        const dur = Date.now() - TIME_TRACKER.sessionStart;
        if (dur > 30000) { // mínimo 30 segundos para contar
          TIME_TRACKER.sessions.push({
            start: TIME_TRACKER.sessionStart,
            end: Date.now(),
            duration: dur
          });
          saveTimeSessions();
        }
        TIME_TRACKER.sessionStart = null;
      }
    } else {
      // App recuperó foco — nueva sesión
      TIME_TRACKER.sessionStart = Date.now();
    }
  });

  // Guardar sesión activa antes de cerrar la página
  window.addEventListener('beforeunload', () => {
    if (TIME_TRACKER.sessionStart) {
      const dur = Date.now() - TIME_TRACKER.sessionStart;
      if (dur > 30000) {
        TIME_TRACKER.sessions.push({
          start: TIME_TRACKER.sessionStart,
          end: Date.now(),
          duration: dur
        });
        saveTimeSessions();
      }
    }
  });

  console.log('[AMI] Time tracker iniciado.');
}

function saveTimeSessions() {
  try {
    const todayKey = new Date().toLocaleDateString('es-UY');
    const all = JSON.parse(localStorage.getItem('ami_time_sessions') || '{}');
    all[todayKey] = TIME_TRACKER.sessions;
    // Guardar máximo 7 días
    const keys = Object.keys(all).sort();
    if (keys.length > 7) keys.slice(0, keys.length - 7).forEach(k => delete all[k]);
    localStorage.setItem('ami_time_sessions', JSON.stringify(all));
  } catch(e) {}
}

function getTimeStats() {
  // Calcular tiempo actual de la sesión en curso
  const current = TIME_TRACKER.sessionStart ? (Date.now() - TIME_TRACKER.sessionStart) : 0;
  const todaySessions = [...TIME_TRACKER.sessions];
  if (current > 0) todaySessions.push({ duration: current, start: TIME_TRACKER.sessionStart, end: Date.now() });

  const totalToday = todaySessions.reduce((acc, s) => acc + s.duration, 0);
  const sessionCount = todaySessions.length;

  // Últimos 7 días
  const weekStats = [];
  try {
    const all = JSON.parse(localStorage.getItem('ami_time_sessions') || '{}');
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toLocaleDateString('es-UY');
      const sessions = all[key] || [];
      const total = sessions.reduce((acc, s) => acc + s.duration, 0);
      if (i === 0) weekStats.unshift({ label: 'Hoy', total: totalToday });
      else if (total > 0) weekStats.unshift({ label: key, total });
    }
  } catch(e) {}

  return { totalToday, sessionCount, weekStats, current };
}

function formatDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s % 60}s`;
  return `${s}s`;
}

function handleTimeTrack() {
  const stats = getTimeStats();
  openTimePanel(stats);

  const { totalToday, sessionCount, current } = stats;
  const tdStr = formatDuration(totalToday);
  const curStr = current > 0 ? formatDuration(current) : '0s';

  return `Hoy usaste Ami durante ${tdStr} en ${sessionCount} sesión${sessionCount !== 1 ? 'es' : ''}. La sesión actual lleva ${curStr}.`;
}

function openTimePanel(stats) {
  const { totalToday, sessionCount, weekStats, current } = stats;
  const maxWeek = Math.max(...weekStats.map(w => w.total), 1);

  const weekRows = weekStats.map(w => `
    <div class="time-session">
      <span class="time-session-label">${w.label}</span>
      <span class="time-session-dur">${formatDuration(w.total)}</span>
    </div>
    <div class="time-bar-wrap">
      <div class="time-bar"><div class="time-bar-fill" style="width:${Math.round(w.total/maxWeek*100)}%"></div></div>
    </div>
  `).join('');

  const content = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-family:var(--font-hud);font-size:8px;letter-spacing:2px;color:var(--text-dim)">HOY TOTAL</div>
        <div class="time-total">${formatDuration(totalToday)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-hud);font-size:8px;letter-spacing:2px;color:var(--text-dim)">SESIÓN ACTUAL</div>
        <div class="time-total" id="time-current-live">${current > 0 ? formatDuration(current) : '—'}</div>
      </div>
    </div>
    <div style="font-family:var(--font-hud);font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:10px">ÚLTIMOS 7 DÍAS</div>
    <div style="max-height:280px;overflow-y:auto">${weekRows || '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:16px">Sin datos aún.</div>'}</div>
    <div style="margin-top:10px;font-size:11px;color:var(--text-dim);border-top:1px solid rgba(0,204,163,0.1);padding-top:8px">${sessionCount} sesión${sessionCount !== 1 ? 'es' : ''} hoy</div>
  `;

  const existing = document.getElementById('panel-timetracker');
  if (existing) {
    const body = document.getElementById('panel-body-timetracker');
    if (body) body.innerHTML = content;
    // Actualizar live cada segundo
    startTimeLiveUpdate();
    return;
  }
  createPanel('timetracker', '⏱ TIEMPO DE USO', content, { width: 340 });
  startTimeLiveUpdate();
}

function startTimeLiveUpdate() {
  clearInterval(window._timeLiveInterval);
  window._timeLiveInterval = setInterval(() => {
    const el = document.getElementById('time-current-live');
    if (!el || !document.getElementById('panel-timetracker')) {
      clearInterval(window._timeLiveInterval);
      return;
    }
    const current = TIME_TRACKER.sessionStart ? (Date.now() - TIME_TRACKER.sessionStart) : 0;
    el.textContent = current > 0 ? formatDuration(current) : '—';
  }, 1000);
}

async function checkDueTasks() {
  await new Promise(r => setTimeout(r, 3000)); // esperar a que todo arranque
  if (!STATE.tasks || STATE.tasks.length === 0) return;

  const today = new Date().toISOString().slice(0,10);
  const overdue = STATE.tasks.filter(t => !t.done && t.dueDate && t.dueDate < today);
  const dueToday = STATE.tasks.filter(t => !t.done && t.dueDate === today);
  const highPrio = STATE.tasks.filter(t => !t.done && t.priority === 'alta' && !t.dueDate);

  const items = [];
  if (overdue.length > 0) items.push(`${overdue.length} tarea${overdue.length > 1 ? 's' : ''} vencida${overdue.length > 1 ? 's' : ''}`);
  if (dueToday.length > 0) items.push(`${dueToday.length} tarea${dueToday.length > 1 ? 's' : ''} para hoy`);
  if (items.length === 0 && highPrio.length > 0) items.push(`${highPrio.length} tarea${highPrio.length > 1 ? 's' : ''} de alta prioridad`);

  if (items.length === 0) return;

  const msg = `Ima, te recuerdo que tenés ${items.join(' y ')}. Decime "plan del día" para verlas.`;
  if (!STATE.openPanels['chat']) openChatPanel();
  addChatMessage('ami', msg);
  await speak(msg);
}

async function tryExtractTaskFromChat(userText, amiReply) {
  // Solo intentar si el mensaje suena a que hay algo pendiente pero NO fue ruteado como planning
  const hasTaskSignal = /tengo que|hay que|necesito|me falta|pendiente|debo|quiero hacer|voy a|debería/i.test(userText);
  if (!hasTaskSignal) return;

  try {
    const check = await chatCompletion([
      { role: 'system', content: 'Respondé SOLO con "sí" o "no". ¿El mensaje del usuario expresa algo concreto que tiene que hacer o completar (una tarea, acción pendiente)? No cuentes preguntas ni conversación general.' },
      { role: 'user', content: userText }
    ], CONFIG.models.chatFast, { max_tokens: 5, temperature: 0 });

    if (!/s[ií]/i.test(check)) return;

    // Extraer el texto de la tarea
    const taskText = await chatCompletion([
      { role: 'system', content: 'Extraé la tarea concreta que menciona el usuario. Respondé SOLO con el texto de la tarea en infinitivo, máximo 10 palabras, sin puntuación final.' },
      { role: 'user', content: userText }
    ], CONFIG.models.chatFast, { max_tokens: 25, temperature: 0.1 });

    if (!taskText || taskText.length < 3) return;

    const clean = taskText.trim().replace(/^"(.*)"$/, '$1');

    // Ofrecer al usuario agregar la tarea (sin pregunta verbal, solo notification clicable)
    showNotifWithAction(`¿Agregar tarea: "${clean.slice(0,35)}"?`, () => {
      const task = {
        id: genTaskId(),
        text: clean,
        done: false,
        priority: parsePriority(userText),
        dueDate: parseDueDate(userText),
        category: parseCategory(clean),
        createdAt: new Date().toISOString(),
      };
      STATE.tasks.push(task);
      saveTasks();
      renderPlanningPanel && renderPlanningPanel();
      showNotif('Tarea agregada ✓', 'info');
    });
  } catch(e) {}
}

function showNotifWithAction(text, onConfirm) {
  const container = document.getElementById('notifications');
  if (!container) return;
  const el = document.createElement('div');
  el.style.cssText = 'display:flex;gap:8px;align-items:center;background:rgba(0,204,163,0.12);border:1px solid rgba(0,204,163,0.3);color:var(--t);font-family:var(--font-hud);font-size:10px;letter-spacing:1px;padding:8px 14px;border-radius:4px;backdrop-filter:blur(12px);animation:notifIn 0.3s ease-out;pointer-events:all;max-width:420px';
  el.innerHTML = `<span style="flex:1">${text}</span>
    <button onclick="this.closest('div').remove();(${onConfirm.toString()})()" style="background:rgba(0,204,163,0.2);border:1px solid var(--t);color:var(--t);font-family:var(--font-hud);font-size:9px;letter-spacing:1px;padding:4px 10px;border-radius:3px;cursor:pointer">✓ SÍ</button>
    <button onclick="this.closest('div').remove()" style="background:none;border:1px solid rgba(0,204,163,0.2);color:var(--text-dim);font-family:var(--font-hud);font-size:9px;padding:4px 8px;border-radius:3px;cursor:pointer">✕</button>`;
  container.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.remove(); }, 12000);
}

// ─── Acciones del orb (click para forzar escucha) ─────────────────────
document.getElementById('orb-container').addEventListener('click', () => {
  if (STATE.isSpeaking) {
    stopSpeaking();
  }
});

// ─── Atajos de teclado ────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    stopSpeaking();
    // Cerrar el panel más reciente
    const panels = Object.keys(STATE.openPanels);
    if (panels.length > 0) closePanel(panels[panels.length - 1]);
  }
});

// ─── Atención a alertas del bridge ────────────────────────────────────
setInterval(async () => {
  if (!STATE.bridgeConnected) return;
  try {
    const result = await sendBridgeCommand({ type: 'get_alerts' });
    if (result?.alerts?.length > 0) {
      result.alerts.forEach(a => {
        showNotif(a.message, a.severity === 'critical' ? 'error' : 'warning');
      });
    }
  } catch (e) {}
}, 15000);

// Sombra de fondo que se vuelve activa
document.body.classList.add('idle');
</script>
</body>
